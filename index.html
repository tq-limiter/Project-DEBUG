      const y = (p?.y ?? (vp.y + vp.h * 0.45)) + (Math.random() * 2 - 1) * jitterY;
      return { x: clamp(x, vp.x + 12, vp.x + vp.w - 12), y: clamp(y, vp.y + 12, vp.y + vp.h - 12) };
    }

    function updateBossHelperDrops(dt) {
      if (!boss || boss.defeated) return;
      boss.healthPickups = boss.healthPickups || [];
      updateHealthPickups(boss, dt);
    }

    function updateEnding(dt) {
      endingT += dt;
      ending.creditsY -= 42 * dt;
      if (endingT > 18.5) completedTitleMenu();
    }

    function formatRunTime(ms) {
      const total = Math.max(0, Math.floor(ms / 1000));
      const hour = Math.floor(total / 3600);
      const min = Math.floor((total % 3600) / 60);
      const sec = total % 60;
      return `${hour.toString().padStart(2, "0")}:${min.toString().padStart(2, "0")}:${sec.toString().padStart(2, "0")}`;
    }

    function updateOpening(dt) {
      storyT += dt;
      if (storyT > 11.5) startGame();
    }

    function updateBossDiscovery(dt) {
      storyT += dt;
      if (storyT > 10.6) {
        applyBossPrototype();
        enterBoss();
      }
      mouse.justDown = false;
      mouse.justRight = false;
      keys.clear();
    }

    function updateEpilogue(dt) {
      storyT += dt;
      if (storyT > 10.5) enterCredits();
    }

    function updateBadEnding(dt) {
      badEndingT += dt;
      if (badEndingT > 8.2) {
        titleMenu();
      }
    }

    function updateHookPractice(dt) {
      if (player.x > 9550) {
        const safe = safeLandingPoint(120, 1280, practiceFloors);
        player.x = safe.x;
        player.y = safe.y;
        player.vx = 0;
        player.vy = 0;
        player.hook = null;
        playerTrail.length = 0;
        camera2D.x = player.x;
        camera2D.y = player.y - 100;
        beep(620, 0.08, "triangle", 0.035, 1.25);
        burst(W / 2, H * 0.45, "#fff", 18, 240);
      }
    }

    function draw() {
      if (hintEl) {
        hintEl.style.opacity = (gameCompleted && state === STATE_INTRO) || [STATE_OPENING, STATE_EPILOGUE, STATE_ENDING, STATE_BAD_ENDING, STATE_EXITED].includes(state) ? "0" : "1";
        hintEl.textContent = state === STATE_HOOK_PRACTICE
          ? (lang === "ko"
            ? "HOOK PRACTICE | A/D 스윙 가속 | W/S 줄 조절 | LMB 훅/스윙 | RMB 조준"
            : "HOOK PRACTICE | A/D Swing Speed | W/S Rope | LMB Hook/Swing | RMB Aim")
          : (lang === "ko"
            ? "DEBUG | A/D 이동 | Space 점프 | LMB 훅/스윙 | RMB 조준/패링 | F 대쉬"
            : "DEBUG | A/D Move | Space Jump | LMB Hook/Swing | RMB Aim/Parry | F Dash");
      }
      ctx.save();
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, W, H);
      if (screenShake.t > 0) {
        const k = screenShake.max > 0 ? screenShake.t / screenShake.max : 0;
        const p = screenShake.power * k * k;
        const sx = Math.sin(gameTime * 91.7) * p + Math.sin(gameTime * 41.3) * p * 0.45;
        const sy = Math.cos(gameTime * 83.1) * p + Math.sin(gameTime * 52.9) * p * 0.35;
        ctx.translate(sx, sy);
      }
      drawBackgroundNoise();

      if (state === STATE_INTRO) drawIntro();
      else if (state === STATE_OPENING) drawOpeningCinematic();
      else if (state === STATE_TUTORIAL || state === STATE_HOOK_PRACTICE || state === STATE_GAME_2D) draw2DScene();
      else if (state === STATE_GAME_3D_BYPASS) draw3DScene();
      else if (state === STATE_BOSS_DISCOVERY) drawBossDiscoveryCinematic();
      else if (state === STATE_BOSS_P1) drawBoss3D();
      else if (state === STATE_BOSS_P2) drawBossMaze();
      else if (state === STATE_BOSS_P3) drawBoss3D();
      else if (state === STATE_EPILOGUE) drawEpilogueCinematic();
      else if (state === STATE_ENDING) drawEnding();
      else if (state === STATE_GAMEOVER) drawGameOver();
      else if (state === STATE_BAD_ENDING) drawBadEnding();
      else if (state === STATE_EXITED) drawExited();

      drawOverlay();
      if (pauseMenu.active) drawPauseMenu();
      if (tutorialPause && state !== STATE_TUTORIAL) drawTutorialPause();
      if (whiteout > 0) {
        ctx.fillStyle = `rgba(255,255,255,${whiteout * 1.6})`;
        ctx.fillRect(0, 0, W, H);
      }
      if (phaseBlackout > 0) {
        const k = clamp(phaseBlackout / 0.86, 0, 1);
        const a = clamp(k * 1.22, 0, 0.96);
        ctx.fillStyle = `rgba(0,0,0,${a})`;
        ctx.fillRect(0, 0, W, H);
        ctx.save();
        ctx.globalAlpha = a * 0.55;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 1;
        for (let i = 0; i < 9; i++) {
          const y = (Math.sin(gameTime * 19 + i * 4.7) * 0.5 + 0.5) * H;
          const x1 = Math.random() * W * 0.25;
          const x2 = W - Math.random() * W * 0.22;
          line(x1, y, x2, y + Math.sin(i + gameTime * 5) * 4, "#ffffff", 1);
        }
        ctx.restore();
      }
      drawMouseCursor();
      ctx.restore();
    }

    function drawMouseCursor() {
      if (!shouldDrawMouseCursor()) return;
      const x = clamp(mouse.x, 10, W - 10);
      const y = clamp(mouse.y, 10, H - 10);
      const pulse = 1 + Math.sin(gameTime * 8) * 0.08;
      const color = gameCompleted && state === STATE_INTRO ? "#000" : "#fff";
      ctx.save();
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 7;
      ctx.lineWidth = 1.2;
      line(x - 10 * pulse, y, x - 4, y, color, 1.2);
      line(x + 4, y, x + 10 * pulse, y, color, 1.2);
      line(x, y - 10 * pulse, x, y - 4, color, 1.2);
      line(x, y + 4, x, y + 10 * pulse, color, 1.2);
      ctx.beginPath();
      ctx.arc(x, y, 2.5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function shouldDrawMouseCursor() {
      if (pauseMenu.active) return true;
      return [
        STATE_INTRO,
        STATE_OPENING,
        STATE_TUTORIAL,
        STATE_HOOK_PRACTICE,
        STATE_GAME_2D,
        STATE_EPILOGUE,
        STATE_ENDING,
        STATE_GAMEOVER
      ].includes(state);
    }

    function drawPauseMenu() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "rgba(255,255,255,0.38)";
      ctx.lineWidth = 1;
      for (let i = 0; i < 26; i++) {
        const y = (i * 57 + gameTime * 22) % H;
        line(0, y, W, y + Math.sin(i + gameTime * 2) * 10, "rgba(255,255,255,0.07)", 1);
      }
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 18;
      ctx.font = "700 34px Consolas, monospace";
      ctx.fillText("SYSTEM PAUSED", W / 2, H / 2 - 92);
      ctx.shadowBlur = 8;
      ctx.font = "13px Consolas, monospace";
      ctx.fillStyle = "rgba(255,255,255,0.72)";
      ctx.fillText(lang === "ko" ? "ESC 또는 RESUME으로 계속" : "ESC OR RESUME TO CONTINUE", W / 2, H / 2 - 62);
      for (const b of pauseButtons()) {
        const hover = mouse.x >= b.x && mouse.x <= b.x + b.w && mouse.y >= b.y && mouse.y <= b.y + b.h;
        ctx.fillStyle = hover ? "rgba(255,255,255,0.20)" : "rgba(0,0,0,0.58)";
        ctx.strokeStyle = hover ? "#fff" : "rgba(255,255,255,0.62)";
        ctx.shadowBlur = hover ? 16 : 6;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.strokeRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = "#fff";
        ctx.font = "700 16px Consolas, monospace";
        ctx.fillText(b.label, b.x + b.w / 2, b.y + 27);
      }
      ctx.restore();
    }

    function drawBackgroundNoise() {
      ctx.save();
      ctx.globalAlpha = 0.22;
      for (let i = 0; i < 70; i++) {
        const x = (chanceNoise(i + gameTime * 7) * 0.5 + 0.5) * W;
        const y = (chanceNoise(i * 3.1 + gameTime * 5) * 0.5 + 0.5) * H;
        const w = 8 + Math.abs(chanceNoise(i * 9.3)) * 90;
        ctx.fillStyle = i % 9 === 0 ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.55)";
        ctx.fillRect(x, y, w, 1 + (i % 3));
      }
      ctx.restore();
    }

    function drawIntro() {
      if (gameCompleted) {
        drawCompletedMenu();
        return;
      }
      const menu = introMenuLayout();
      const cx = W / 2;
      const cy = H / 2;
      ctx.save();
      drawIntroBackdrop(cx, cy);
      drawDebugIcon(cx, cy - 154, 70, "#ffffff", "#ff3030");
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 24;
      ctx.font = "700 78px Consolas, monospace";
      ctx.fillText("DEBUG", cx, cy - 40);
      ctx.shadowBlur = 9;
      ctx.font = "700 13px Consolas, monospace";
      ctx.fillStyle = "rgba(255,255,255,0.74)";
      ctx.fillText("VACCINE PROTOCOL // CORRUPTION PURGE", cx, cy - 8);
      ctx.fillStyle = "#fff";
      ctx.font = "700 17px Consolas, monospace";
      ctx.fillText(`${msg("breach")} // ${msg("start")}`, cx, cy + 34);
      drawDeveloperPlate(cx + 520, cy - 120);
      ctx.font = "700 16px Consolas, monospace";
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      ctx.shadowBlur = 8;
      ctx.fillText(msg("choose"), cx, cy + 92);
      drawMenuButton(menu.english, `${lang === "en" ? "> " : ""}${msg("english")}`, lang === "en");
      drawMenuButton(menu.korean, `${lang === "ko" ? "> " : ""}${msg("korean")}`, lang === "ko");
      drawHookPracticeButton(menu.practice);
      if (lang === "ko") {
        ctx.fillStyle = "#ff3030";
        ctx.shadowColor = "#ff3030";
        ctx.shadowBlur = 10;
        ctx.font = "700 13px Consolas, monospace";
        ctx.fillText(msg("translationWarning"), cx, cy + 192);
      }
      drawMenuButton(menu.exit, "EXIT", false, true);
      drawIntroScanline(cx, cy + 74);
      ctx.restore();
    }

    function drawIntroBackdrop(cx, cy) {
      ctx.save();
      ctx.globalAlpha = 0.9;
      for (let i = 0; i < 22; i++) {
        const y = (cy - 310) + i * 28;
        const drift = Math.sin(gameTime * 0.9 + i * 1.7) * 24;
        line(cx - 520 + drift, y, cx + 520 + drift * 0.35, y + Math.sin(i) * 10, "rgba(255,255,255,0.055)", 1);
      }
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - 386, cy - 238, 772, 410);
      ctx.strokeStyle = "rgba(255,48,48,0.45)";
      ctx.shadowColor = "#ff3030";
      ctx.shadowBlur = 14;
      line(cx - 386, cy - 238, cx - 272, cy - 238, "#ff3030", 2);

    function draw2DScene() {
      ctx.save();
      applyCamera2D();
      const view = visibleWorldBounds(520);
      if (state === STATE_GAME_2D) drawChasingWall();
      const sceneFloors = state === STATE_TUTORIAL ? tutorialFloors : (state === STATE_HOOK_PRACTICE ? practiceFloors : floors);
      const sceneWalls = state === STATE_TUTORIAL ? tutorialWalls : (state === STATE_HOOK_PRACTICE ? practiceWalls : walls);
      const sceneAnchors = state === STATE_TUTORIAL ? tutorialAnchors : (state === STATE_HOOK_PRACTICE ? practiceAnchors : anchors);
      sceneFloors.forEach(r => { if (rectVisible(r, view)) drawDarkRect(r); });
      sceneWalls.forEach(r => { if (rectVisible(r, view)) drawDarkRect(r); });
      if (state === STATE_GAME_2D) {
        inversionPads.forEach(p => {
          if (!rectVisible(p, view)) return;
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 2 / camera2D.zoom;
          ctx.strokeRect(p.x, p.y, p.w, p.h);
          for (let i = 0; i < 4; i++) line(p.x + 10 + i * 28, p.y + p.h, p.x + 22 + i * 28, p.y, "#fff", 1.5 / camera2D.zoom);
        });
        deadSectors.forEach(d => {
          if (!rectVisible(d, view)) return;
          const on = ((gameTime + d.phase) % 1) < 0.52;
          ctx.fillStyle = on ? "rgba(255,255,255,0.88)" : "rgba(255,255,255,0.12)";
          ctx.fillRect(d.x, d.y, d.w, d.h);
          ctx.strokeStyle = "#fff";
          ctx.strokeRect(d.x, d.y, d.w, d.h);
        });
        skyLasers.forEach(lz => {
          if (!rectVisible(rect(lz.x - 40, camera2D.y - H / camera2D.zoom, 80, H / camera2D.zoom * 2), view)) return;
          const firing = lz.t < lz.warn;
          ctx.save();
          ctx.globalAlpha = firing ? 0.82 : 0.35 + Math.sin(gameTime * 24) * 0.15;
          ctx.strokeStyle = firing ? "#ff3030" : "#fff";
          ctx.fillStyle = firing ? "rgba(255,48,48,0.45)" : "rgba(255,255,255,0.08)";
          ctx.shadowColor = ctx.strokeStyle;
          ctx.shadowBlur = firing ? 22 / camera2D.zoom : 10 / camera2D.zoom;
          ctx.lineWidth = firing ? 4 / camera2D.zoom : 2 / camera2D.zoom;
          const turretY = -270;
          ctx.fillStyle = "#000";
          ctx.strokeStyle = firing ? "#ff3030" : "#fff";
          ctx.lineWidth = 2.5 / camera2D.zoom;
          ctx.beginPath();
          ctx.arc(lz.x, turretY + 20, 34, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(lz.x - 70, turretY + 20);
          ctx.lineTo(lz.x - 34, turretY + 2);
          ctx.lineTo(lz.x - 34, turretY + 38);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(lz.x + 70, turretY + 20);
          ctx.lineTo(lz.x + 34, turretY + 2);
          ctx.lineTo(lz.x + 34, turretY + 38);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = firing ? "#ff3030" : "#fff";
          ctx.fillRect(lz.x - 9, turretY + 13, 18, 14);
          ctx.fillStyle = "#000";
          ctx.beginPath();
          ctx.moveTo(lz.x - 18, turretY + 42);
          ctx.lineTo(lz.x + 18, turretY + 42);
          ctx.lineTo(lz.x + 8, turretY + 70);
          ctx.lineTo(lz.x - 8, turretY + 70);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          for (let i = 0; i < 3; i++) line(lz.x - 22 + i * 22, turretY + 8, lz.x - 10 + i * 20, turretY + 34, firing ? "#ff3030" : "#fff", 1.2 / camera2D.zoom);
          ctx.fillStyle = firing ? "rgba(255,48,48,0.45)" : "rgba(255,255,255,0.08)";
          ctx.fillRect(lz.x - (firing ? 16 : 7), turretY + 70, firing ? 32 : 14, world.h + 300);
          line(lz.x, turretY + 70, lz.x, world.h + 200, ctx.strokeStyle, ctx.lineWidth);
          ctx.restore();
        });
        sideLasers.forEach(lz => {
          const top = camera2D.y - H / camera2D.zoom;
          const left = camera2D.x - W / camera2D.zoom;
          const right = camera2D.x + W / camera2D.zoom;
          if (lz.y < top - 120 || lz.y > camera2D.y + H / camera2D.zoom + 120) return;
          const firing = lz.t < lz.warn;
          ctx.save();
          ctx.globalAlpha = firing ? 0.86 : 0.35 + Math.sin(gameTime * 24) * 0.14;
          ctx.strokeStyle = firing ? "#ff3030" : "#fff";
          ctx.fillStyle = "#000";
          ctx.shadowColor = ctx.strokeStyle;
          ctx.shadowBlur = firing ? 22 / camera2D.zoom : 10 / camera2D.zoom;
          ctx.lineWidth = firing ? 4 / camera2D.zoom : 2 / camera2D.zoom;
          const turretX = lz.dir > 0 ? left - 90 : right + 90;
          ctx.beginPath();
          ctx.arc(turretX, lz.y, 34, 0, Math.PI * 2);
          ctx.fill();
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(turretX + (lz.dir > 0 ? 34 : -34), lz.y - 18);
          ctx.lineTo(turretX + (lz.dir > 0 ? 76 : -76), lz.y);
          ctx.lineTo(turretX + (lz.dir > 0 ? 34 : -34), lz.y + 18);
          ctx.closePath();
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = firing ? "rgba(255,48,48,0.45)" : "rgba(255,255,255,0.08)";
          ctx.fillRect(left - 200, lz.y - (firing ? 14 : 6), right - left + 400, firing ? 28 : 12);
          line(left - 220, lz.y, right + 220, lz.y, ctx.strokeStyle, ctx.lineWidth);
          ctx.restore();
        });
        waterfalls.forEach(w => { if (rectVisible(w, view)) drawWaterfall(w); });
        gates.forEach(g => {
          if (g.locked && rectVisible(rect(g.x - 18, -2600, g.w + 36, world.h + 5400), view)) {
            drawGateWallPortal(g);
          }
        });
        if (gates.every(g => g.cleared) && rectVisible(bossPortal2D, view)) drawBossPortal2D();
        enemies2D.forEach(e => { if (e.alive && e.active && pointVisible(e.x, e.y, view, 80)) drawDarkCircle(e.x, e.y, e.r); });
      } else if (state === STATE_TUTORIAL) {
        drawTutorialTrapSamples();
        drawTrainingPortal2D();
        if (trainingPortal.completed) drawTutorialExitPortal();
        else drawDevBossRift();
        drawTutorialEnemies();
      }
      if (state === STATE_TUTORIAL) drawWorldTutorialSigns();
      sceneAnchors.forEach(a => { if (pointVisible(a.x, a.y, view, 160)) drawAnchor(a); });
      if (player.hook) line(player.x + 10, player.y + 10 + (world.gravity > 0 ? -PLAYER_2D_VISUAL_LIFT : PLAYER_2D_VISUAL_LIFT), player.hook.x, player.hook.y, "#fff", 2 / camera2D.zoom);
      if (state === STATE_GAME_2D) drawCorruptedPast();
      drawPlayerTrail2D();
      drawPlayer2D();
      ctx.restore();
      drawGlitchBlindOverlay();
      if (tutorialPause) drawTutorialPause();
    }

    function drawCorruptedPast() {
      const left = camera2D.x - W / camera2D.zoom;
      const top = camera2D.y - H / camera2D.zoom;
      const bottom = camera2D.y + H / camera2D.zoom;
      const x = Math.min(chasingWall.x, camera2D.x + W / camera2D.zoom);
      if (x <= left) return;
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.88)";
      ctx.fillRect(left, top, x - left, bottom - top);
      ctx.globalAlpha = 0.26;
      for (let i = 0; i < 52; i++) {
        const yy = top + ((i * 149 + gameTime * 90) % (bottom - top));
        const cut = Math.sin(i * 7.1 + gameTime * 15);
        line(left, yy, x, yy + cut * 18, i % 5 ? "rgba(255,255,255,0.16)" : "#000", (i % 5 ? 1.4 : 9) / camera2D.zoom);
      }
      ctx.globalAlpha = 0.55;
      for (let i = 0; i < 34; i++) {
        const yy = top + ((i * 211 + gameTime * 130) % (bottom - top));
        const w = 28 + (Math.sin(i * 13.4 + gameTime * 8) * 0.5 + 0.5) * 180;
        const xx = left + ((i * 337 + gameTime * 70) % Math.max(1, x - left));
        ctx.fillStyle = i % 4 ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.95)";
        ctx.fillRect(xx, yy, Math.min(w, x - xx), (3 + (i % 5) * 2) / camera2D.zoom);
      }
      ctx.restore();
    }

    function drawGlitchBlindOverlay() {
      if (glitchBlind <= 0) return;
      ctx.save();
      const a = clamp(glitchBlind / 2.4, 0, 1);
      const sx = (player.x + player.w / 2 - camera2D.x) * camera2D.zoom + W / 2;
      const sy = (player.y + player.h / 2 - camera2D.y) * camera2D.zoom + H / 2;
      const nearR = 48 + (1 - a) * 18;
      const farR = 150 + (1 - a) * 45;
      const veil = ctx.createRadialGradient(sx, sy, 0, sx, sy, Math.max(W, H) * 0.85);
      veil.addColorStop(0, `rgba(0,0,0,${0.34 + a * 0.22})`);
      veil.addColorStop(nearR / (Math.max(W, H) * 0.85), `rgba(0,0,0,${0.56 + a * 0.18})`);
      veil.addColorStop(farR / (Math.max(W, H) * 0.85), `rgba(0,0,0,${0.86 + a * 0.10})`);
      veil.addColorStop(1, "rgba(0,0,0,0.98)");
      ctx.globalAlpha = 1;
      ctx.fillStyle = veil;
      ctx.fillRect(0, 0, W, H);
      for (let i = 0; i < 90; i++) {
        const x = (Math.sin(i * 31.7 + gameTime * 9) * 0.5 + 0.5) * W;
        const y = (Math.sin(i * 17.3 + gameTime * 13) * 0.5 + 0.5) * H;
        const dist = len(x - sx, y - sy);
        if (dist < nearR * 0.9) continue;
        ctx.globalAlpha = clamp((dist - nearR * 0.45) / (farR - nearR * 0.45), 0, 1) * (0.38 + a * 0.54);
        const w = 20 + Math.abs(Math.sin(i * 11.1)) * 180;
        line(x, y, x + w, y + Math.sin(gameTime * 20 + i) * 16, i % 4 ? "#000" : "#fff", i % 4 ? 5 : 1.2);
      }
      ctx.restore();
    }

    function wrapText(textValue, x, y, maxWidth, lineHeight, align = "left") {
      const raw = String(textValue);
      const words = raw.includes(" ") ? raw.split(" ") : [...raw];
      let lineText = "";
      ctx.textAlign = align;
      for (const word of words) {
        const joiner = raw.includes(" ") ? " " : "";
        const test = lineText ? `${lineText}${joiner}${word}` : word;
        if (ctx.measureText(test).width > maxWidth && lineText) {
          ctx.fillText(lineText, x, y);
          lineText = word;
          y += lineHeight;
        } else {
          lineText = test;
        }
      }
      if (lineText) ctx.fillText(lineText, x, y);
    }

    function drawGateWallPortal(g) {
      const wall = { x: g.x - 24, y: -2600, w: g.w + 48, h: world.h + 5400 };
      const cx = g.x + g.w / 2;
      const topEnd = g.y + 18;
      const bottomStart = g.y + g.h - 18;
      ctx.save();
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3 / camera2D.zoom;
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 8 / camera2D.zoom;
      ctx.fillRect(wall.x, wall.y, wall.w, g.y - wall.y + 36);
      ctx.fillRect(wall.x, bottomStart, wall.w, wall.y + wall.h - bottomStart);
      ctx.beginPath();
      ctx.moveTo(wall.x, wall.y);
      ctx.lineTo(wall.x, topEnd);
      ctx.quadraticCurveTo(wall.x, g.y + 80, cx - g.w * 0.52, g.y + 120);
      ctx.moveTo(wall.x + wall.w, wall.y);
      ctx.lineTo(wall.x + wall.w, topEnd);
      ctx.quadraticCurveTo(wall.x + wall.w, g.y + 80, cx + g.w * 0.52, g.y + 120);
      ctx.moveTo(wall.x, wall.y + wall.h);
      ctx.lineTo(wall.x, bottomStart);
      ctx.quadraticCurveTo(wall.x, g.y + g.h - 80, cx - g.w * 0.52, g.y + g.h - 120);
      ctx.moveTo(wall.x + wall.w, wall.y + wall.h);
      ctx.lineTo(wall.x + wall.w, bottomStart);
      ctx.quadraticCurveTo(wall.x + wall.w, g.y + g.h - 80, cx + g.w * 0.52, g.y + g.h - 120);
      ctx.stroke();
      ctx.globalAlpha = 0.22;
      for (let y = wall.y; y < wall.y + wall.h; y += 46) {
        if (y > g.y - 50 && y < g.y + g.h + 50) continue;
        line(wall.x + 8, y, wall.x + wall.w - 8, y + 28, "#fff", 1 / camera2D.zoom);
      }
      ctx.restore();
      drawPortal2D(g);
    }

    function drawWorldSign(x, y, title, body, index, preview = "") {
      ctx.save();
      ctx.font = `${Math.max(15, 17 / camera2D.zoom)}px Consolas, monospace`;
      const titleW = ctx.measureText(title).width;
      const oneLineBodyW = ctx.measureText(String(body)).width;
      const w = clamp(Math.max(420, titleW + 90, Math.min(oneLineBodyW + (preview ? 210 : 90), 720)), preview ? 540 : 420, 760);
      const textWidth = w - (preview ? 170 : 64);
      const bodyLines = measureWrappedLines(body, textWidth);
      ctx.restore();
      const h = Math.max(preview ? 250 : 170, 118 + bodyLines * (27 / camera2D.zoom) + (preview ? 58 : 18));
      const flicker = 0.65 + Math.sin(gameTime * 5 + index) * 0.15;
      ctx.save();
      ctx.globalAlpha = flicker;
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.fillStyle = "rgba(0,0,0,0.36)";
      ctx.lineWidth = 2 / camera2D.zoom;
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 8 / camera2D.zoom;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
      ctx.shadowBlur = 0;
      ctx.font = `${Math.max(18, 22 / camera2D.zoom)}px Consolas, monospace`;
      ctx.fillStyle = "#fff";
      ctx.textAlign = "left";
      ctx.fillText(title, x + 28, y + 54);
      ctx.globalAlpha = flicker * 0.78;
      ctx.font = `${Math.max(15, 17 / camera2D.zoom)}px Consolas, monospace`;
      wrapText(body, x + 28, y + 96, textWidth, 27 / camera2D.zoom, "left");
      ctx.globalAlpha = flicker * 0.55;
      if (preview) drawTrapPreview(x + w - 110, y + 34, preview, index);
      ctx.restore();
    }

    function measureWrappedLines(textValue, maxWidth) {
      const raw = String(textValue);
      const words = raw.includes(" ") ? raw.split(" ") : [...raw];
      const joiner = raw.includes(" ") ? " " : "";
      let lineText = "";
      let lines = 0;
      for (const word of words) {
        const test = lineText ? `${lineText}${joiner}${word}` : word;
        if (ctx.measureText(test).width > maxWidth && lineText) {
          lines += 1;
          lineText = word;
        } else {
          lineText = test;
        }
      }
      if (lineText) lines += 1;
      return Math.max(1, lines);
    }

    function drawTrapPreview(x, y, type, index) {
      ctx.save();
      ctx.strokeStyle = "#fff";
      ctx.fillStyle = "#000";
      ctx.lineWidth = 2 / camera2D.zoom;
      if (type === "laser") {
        const a = 0.35 + Math.abs(Math.sin(gameTime * 3 + index)) * 0.65;
        ctx.globalAlpha *= a;
        line(x, y + 30, x + 58, y + 30, "#fff", 4 / camera2D.zoom);
        ctx.strokeRect(x - 4, y + 18, 66, 24);
      } else if (type === "waterfall") {
        ctx.strokeRect(x + 14, y, 34, 66);
        for (let i = 0; i < 9; i++) line(x + 18 + (i % 4) * 8, y + i * 7, x + 14 + (i % 5) * 9, y + i * 7 + 12, "#fff", 1 / camera2D.zoom);
      } else if (type === "gravity") {
        ctx.strokeRect(x, y + 44, 62, 14);
        ctx.beginPath();
        ctx.moveTo(x + 31, y + 6);
        ctx.lineTo(x + 18, y + 28);
        ctx.lineTo(x + 26, y + 28);
        ctx.lineTo(x + 26, y + 42);
        ctx.lineTo(x + 36, y + 42);
        ctx.lineTo(x + 36, y + 28);
        ctx.lineTo(x + 44, y + 28);
        ctx.closePath();
        ctx.stroke();
      }
      ctx.restore();
    }

    function applyCamera2D() {
      ctx.translate(W / 2, H / 2);
      ctx.scale(camera2D.zoom, camera2D.zoom);
      ctx.translate(-camera2D.x, -camera2D.y);
    }

    function screenToWorld(x, y) {
      return {
        x: (x - W / 2) / camera2D.zoom + camera2D.x,
        y: (y - H / 2) / camera2D.zoom + camera2D.y
      };
    }

    function visibleWorldBounds(margin = 260) {
      const hw = W / camera2D.zoom / 2;
      const hh = H / camera2D.zoom / 2;
      return {
        x: camera2D.x - hw - margin,
        y: camera2D.y - hh - margin,
        w: hw * 2 + margin * 2,
        h: hh * 2 + margin * 2
      };
    }

    function rectVisible(r, view) {
      return r.x + r.w >= view.x && r.x <= view.x + view.w && r.y + r.h >= view.y && r.y <= view.y + view.h;
    }

    function pointVisible(x, y, view, margin = 120) {
      return x >= view.x - margin && x <= view.x + view.w + margin && y >= view.y - margin && y <= view.y + view.h + margin;
    }

    function drawDarkRect(r, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = Math.max(1, 2 / camera2D.zoom);
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeRect(r.x, r.y, r.w, r.h);
      ctx.globalAlpha = 0.22 * alpha;
      for (let x = r.x; x < r.x + r.w; x += 42) line(x, r.y, x + 24, r.y + r.h, "#fff", 1 / camera2D.zoom);
      ctx.restore();
    }

    function drawPortal2D(g, color = "#fff") {
      const cx = g.x + g.w / 2;
      const cy = g.y + g.h / 2;
      const rx = g.w * 0.75 + Math.sin(gameTime * 5) * 4;
      const ry = g.h * 0.5;
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx * 0.35, ry * 0.95, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 4 / camera2D.zoom;
      ctx.shadowColor = color;
      ctx.shadowBlur = 22 / camera2D.zoom;
      for (let i = 0; i < 3; i++) {
        const wobble = Math.sin(gameTime * 8 + i) * 8;
        ctx.beginPath();
        ctx.ellipse(cx + wobble, cy, rx + i * 18, ry - i * 34, 0, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.shadowBlur = 0;
      for (let i = 0; i < 18; i++) {
        const a = i / 18 * Math.PI * 2 + gameTime * 3;
        const x1 = cx + Math.cos(a) * rx * 0.2;
        const y1 = cy + Math.sin(a) * ry * 0.62;
        const x2 = cx + Math.cos(a) * rx * 0.55;
        const y2 = cy + Math.sin(a) * ry * 0.92;
        line(x1, y1, x2, y2, color, 1.5 / camera2D.zoom);

      ctx.restore();
    }

    function drawChasingWall() {
      ctx.save();
      const top = camera2D.y - H / camera2D.zoom - 220;
      const bottom = camera2D.y + H / camera2D.zoom + 220;
      const height = bottom - top;
      const z = camera2D.zoom;
      const phase = chasingWall.fringe;
      ctx.fillStyle = "#000";
      ctx.fillRect(chasingWall.x - 680, top, 760, height);

      const core = ctx.createLinearGradient(chasingWall.x - 90, 0, chasingWall.x + 84, 0);
      core.addColorStop(0, "rgba(0,0,0,0.98)");
      core.addColorStop(0.43, "rgba(255,255,255,0.06)");
      core.addColorStop(0.50, "rgba(255,255,255,0.90)");
      core.addColorStop(0.56, "rgba(0,0,0,0.95)");
      core.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = core;
      ctx.fillRect(chasingWall.x - 90, top, 174, height);

      for (let layer = 0; layer < 3; layer++) {
        ctx.beginPath();
        ctx.strokeStyle = layer === 0 ? "#fff" : `rgba(255,255,255,${0.62 - layer * 0.11})`;
        ctx.lineWidth = (layer === 0 ? 5.5 : 2.6 + layer) / z;
        for (let y = top; y <= bottom; y += 20) {
          const jag =
            Math.sin(y * (0.052 + layer * 0.013) + phase * (1.0 + layer * 0.22)) * (21 + layer * 9) +
            Math.sin(y * 0.21 + gameTime * (24 + layer * 4) + layer * 3.7) * (6 + layer * 3);
          const snap = Math.sin(y * 0.73 + gameTime * 31 + layer) > 0.83 ? 34 * (layer % 2 ? -1 : 1) : 0;
          const xx = chasingWall.x + jag + snap + layer * 10;
          if (y === top) ctx.moveTo(xx, y);
          else ctx.lineTo(xx, y);
        }
        ctx.stroke();
      }

      for (let i = 0; i < 48; i++) {
        const y = top + ((i * 83 + gameTime * (260 + i % 7 * 13)) % height);
        const pulse = Math.sin(i * 19.17 + gameTime * 18);
        if (pulse < -0.36) continue;
        const side = Math.sin(i * 5.31 + gameTime * 7) > 0 ? 1 : -1;
        const x = chasingWall.x + side * (8 + Math.abs(Math.sin(i * 2.7 + phase)) * 62);
        const w = (18 + Math.abs(Math.sin(i * 8.2)) * 135) / z;
        const h = (2 + (i % 6) * 2) / z;
        ctx.globalAlpha = 0.34 + Math.max(0, pulse) * 0.58;
        ctx.fillStyle = i % 11 === 0 ? "#ff2d2d" : (i % 7 === 0 ? "#54f7ff" : "#fff");
        ctx.fillRect(x, y, w * side, h);
      }

      ctx.globalAlpha = 0.34;
      for (let i = 0; i < 22; i++) {
        const y = top + ((i * 157 + gameTime * 170) % height);
        const x = chasingWall.x - 210 + Math.sin(i * 9.4 + gameTime * 11) * 96;
        ctx.strokeStyle = i % 3 ? "rgba(255,255,255,0.28)" : "rgba(255,0,0,0.28)";
        ctx.lineWidth = (1 + i % 3) / z;
        ctx.strokeRect(x, y, (18 + i % 5 * 10) / z, (10 + i % 4 * 7) / z);
      }

      ctx.globalAlpha = 1;
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 28 / z;
      line(chasingWall.x + Math.sin(gameTime * 50) * 4, top, chasingWall.x + Math.sin(gameTime * 43) * 4, bottom, "#fff", 1.4 / z);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    function project3D(x, y, z, vx, vy, vw, vh) {
      const dx = x - player.px;
      const dy = y - player.py;
      const dz = z - player.pz;
      const cy = Math.cos(-camera3D.yaw), sy = Math.sin(-camera3D.yaw);
      let rx = dx * cy - dz * sy;
      let rz = dx * sy + dz * cy;
      const cp = Math.cos(-camera3D.pitch), sp = Math.sin(-camera3D.pitch);
      const ry = dy * cp - rz * sp;
      rz = dy * sp + rz * cp;
      if (rz >= -0.2) return null;
      const f = (vh * 0.5) / Math.tan(camera3D.fov * Math.PI / 360);
      return { x: vx + vw / 2 + rx * f / -rz, y: vy + vh / 2 + ry * f / -rz, s: f / -rz, depth: -rz };
    }

    function draw3DWorld(vx, vy, vw, vh, roomData, drawPlayer, bossData) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(vx, vy, vw, vh);
      ctx.clip();
      ctx.fillStyle = "#000";
      ctx.fillRect(vx, vy, vw, vh);
      draw3DGrid(vx, vy, vw, vh);
      const objs = [];
      if (roomData) {
        for (const p of roomData.pillars) objs.push({ kind: "pillar", x: p.x, y: p.h / 2, z: p.z, h: p.h });
        for (const e of roomData.enemies) if (e.alive) objs.push({ kind: "enemy", ...e });
        for (const h of roomData.healthPickups || []) if (h.alive) objs.push({ kind: "heal", ...h });
        for (const b of roomData.bullets) objs.push({ kind: b.beam ? "beam" : (b.reflected ? "whiteBullet" : "bullet"), ...b });
        if (roomData.firewall.active) drawFirewall(roomData.firewall, vx, vy, vw, vh);
        drawGate3D(roomData.returnGate.x, roomData.returnGate.z, vx, vy, vw, vh, roomData.tutorial ? "#66ffff" : "#fff", roomData.gateOpen);
        drawFog(roomData.fog, vx, vy, vw, vh);
      }
      if (bossData) {
        drawBossLaserFields(bossData, vx, vy, vw, vh);
        if (!bossData.defeated || !bossData.deathSettled) objs.push({ kind: "boss", x: bossData.x, y: bossData.y, z: bossData.z, defeated: bossData.defeated, deathT: bossData.deathT || 0 });
        for (const t of bossData.towers || []) if (t.alive) objs.push({ kind: "tower", ...t });
        for (const b of bossData.bullets) objs.push({ kind: b.beam ? "beam" : (b.reflected ? "whiteBullet" : "bullet"), ...b });
        for (const m of bossData.mines) if (m.alive) objs.push({ kind: "mine", ...m });
        for (const h of bossData.healthPickups || []) if (h.alive) objs.push({ kind: "heal", ...h });
        if (bossData.defeated) {
          if (bossData.usb?.active) objs.push({ kind: "usb", ...bossData.usb });
          if (bossData.device?.active) objs.push({ kind: "vaccineDevice", ...bossData.device });
        }
      }
      objs.sort((a, b) => {
        const pa = project3D(a.x, a.y || 1, a.z, vx, vy, vw, vh);
        const pb = project3D(b.x, b.y || 1, b.z, vx, vy, vw, vh);
        return (pb?.depth || 0) - (pa?.depth || 0);
      });
      for (const o of objs) draw3DObject(o, vx, vy, vw, vh);
      if (roomData?.chainStrikes) roomData.chainStrikes.forEach(s => drawChainStrike(s, vx, vy, vw, vh));
      if (bossData?.chainStrikes) bossData.chainStrikes.forEach(s => drawChainStrike(s, vx, vy, vw, vh));
      drawChargedSlashFx(vx, vy, vw, vh);
      if (roomData) drawSlashTargetHint(roomData, vx, vy, vw, vh);
      if (bossData?.defeated) drawBossAftermathHint(bossData, vx, vy, vw, vh);
      drawKatana(vx, vy, vw, vh);
      drawCrosshair(vx, vy, vw, vh);
      drawPointerLockHint(vx, vy, vw, vh);
      ctx.restore();
    }

    function draw3DGrid(vx, vy, vw, vh) {
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 1;
      const half = isBossState() ? 128 : 16;
      const farZ = isBossState() ? -248 : -42;
      for (let x = -half; x <= half; x += 2) {
        const a = project3D(x, 0, 18, vx, vy, vw, vh);
        const b = project3D(x, 0, farZ, vx, vy, vw, vh);
        if (a && b) line(a.x, a.y, b.x, b.y, "rgba(255,255,255,0.16)", 1);
      }
      for (let z = 16; z >= farZ; z -= 3) {
        const a = project3D(-half, 0, z, vx, vy, vw, vh);
        const b = project3D(half, 0, z, vx, vy, vw, vh);
        if (a && b) line(a.x, a.y, b.x, b.y, "rgba(255,255,255,0.16)", 1);
      }
    }

    function draw3DObject(o, vx, vy, vw, vh) {
      const p = project3D(o.x, o.y || 1, o.z, vx, vy, vw, vh);
      if (!p) return;
      let size = 1;
      if (o.kind === "boss") size = 11.2;
      else if (o.kind === "tower") size = 1.55 + (o.phase || 1) * 0.28;
      else if (o.kind === "bossDoor") size = 2.4;
      else if (o.kind === "usb") size = 0.85;
      else if (o.kind === "vaccineDevice") size = 4.4;
      else if (o.kind === "heal") size = 0.9;
      else if (o.kind === "core") size = 2.1;
      else if (o.kind === "pillar") size = 1.2;
      else if (o.type === "brute") size = 1.7;
      else if (o.type === "drone") size = 1.85;
      else if (o.type === "miniDrone") size = 0.8;
      else if (o.kind === "mine") size = 0.75;
      else if (o.kind === "beam") size = 0.55;
      else if (o.kind.includes("Bullet") || o.kind === "bullet") size = 0.45;
      const s = clamp(p.s * size, 2, o.kind === "boss" ? 520 : 260);
      const enemyHit = o.kind === "enemy" && (o.hitT || 0) > 0;
      const hitPulse = enemyHit ? clamp((o.hitT || 0) / 0.28, 0, 1) : 0;
      ctx.save();
      ctx.translate(p.x, p.y);
      if (enemyHit) {
        const shake = Math.max(1.5, s * 0.16) * hitPulse;
        ctx.translate(Math.sin(gameTime * 95 + o.x * 3.1) * shake, Math.cos(gameTime * 87 + o.z * 2.4) * shake);
        ctx.rotate(Math.sin(gameTime * 70) * 0.08 * hitPulse);
      }
      ctx.fillStyle = o.kind === "whiteBullet" ? "#fff" : "#000";
      ctx.strokeStyle = o.kind === "beam" ? "#66ffff" : (o.kind === "bullet" || o.homing ? "red" : "#fff");
      if (o.guardT > 0) ctx.strokeStyle = "#66ffff";
      if (enemyHit) {
        ctx.strokeStyle = hitPulse > 0.45 ? "#ffffff" : "#ffffff";
        ctx.fillStyle = `rgba(255,255,255,${0.12 + hitPulse * 0.28})`;
      }
      ctx.lineWidth = o.kind === "boss" ? 3 : 2;
      ctx.shadowColor = ctx.strokeStyle;

      for (let i = 0; i < 4; i++) {
        const yy = -s * 1.6 + i * s * 0.9 + Math.sin(gameTime * 14 + i) * s * 0.16;
        line(-s * (1.7 + i * 0.08), yy, s * (1.3 + i * 0.12), yy + Math.sin(gameTime * 9 + i) * s * 0.25, ctx.strokeStyle, 1.3);
      }
      if (o.type === "brute") {
        for (let i = 0; i < 6; i++) {
          const a = i / 6 * Math.PI * 2 + gameTime * 1.8;
          line(Math.cos(a) * s * 1.35, Math.sin(a) * s * 1.35, Math.cos(a) * s * 1.85, Math.sin(a) * s * 1.85, "#ff3030", 2);
        }
      } else if (o.type === "cube") {
        ctx.strokeRect(-s * 1.35, -s * 1.35, s * 2.7, s * 2.7);
      } else if (o.type === "chain") {
        for (let i = 0; i < 4; i++) ctx.strokeRect(-s * 1.8 + i * s * 0.7, s * 1.25, s * 0.42, s * 0.32);
      } else if (o.type === "drone") {
        ctx.beginPath();
        ctx.arc(0, 0, s * 1.9, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawChainStrike(s, vx, vy, vw, vh) {
      const a = project3D(s.x, 1.0, s.z, vx, vy, vw, vh);
      const b = project3D(s.tx, 1.0, s.tz, vx, vy, vw, vh);
      if (!a || !b) return;
      const progress = 1 - s.t / s.max;
      ctx.save();
      ctx.strokeStyle = progress > 0.45 ? "#ff3030" : "#fff";
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = progress > 0.45 ? 34 : 24;
      ctx.lineWidth = progress > 0.45 ? 10 : 5;
      const segments = 12;
      const activeSwing = Math.sin(clamp(progress, 0, 1) * Math.PI) * 34;
      ctx.beginPath();
      for (let i = 0; i <= segments; i++) {
        const u = i / segments;
        const x = lerp(a.x, b.x, u);
        const y = lerp(a.y, b.y, u) + Math.sin(u * Math.PI * 1.35 + progress * Math.PI * 2.4) * activeSwing + Math.sin(u * Math.PI * 8 + gameTime * 18) * 5;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.globalAlpha = 0.42;
      ctx.lineWidth = progress > 0.45 ? 18 : 10;
      ctx.strokeStyle = progress > 0.45 ? "rgba(255,48,48,0.32)" : "rgba(255,255,255,0.26)";
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.lineWidth = 3.2;
      for (let i = 1; i < segments; i++) {
        const u = i / segments;
        const x = lerp(a.x, b.x, u);
        const y = lerp(a.y, b.y, u) + Math.sin(u * Math.PI * 1.35 + progress * Math.PI * 2.4) * activeSwing;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(u * Math.PI + progress * 2);
        ctx.strokeRect(-10, -7, 20, 14);
        ctx.fillStyle = progress > 0.45 ? "rgba(255,48,48,0.22)" : "rgba(255,255,255,0.16)";
        ctx.fillRect(-8, -5, 16, 10);
        ctx.restore();
      }
      for (let i = 0; i <= 4; i++) {
        const u = i / 4;
        const x = lerp(a.x, b.x, u);
        const y = lerp(a.y, b.y, u) + Math.sin(u * Math.PI * 1.35 + progress * Math.PI * 2.4) * activeSwing;
        ctx.beginPath();
        ctx.arc(x, y, progress > 0.45 ? 5.5 : 3.5, 0, Math.PI * 2);
        ctx.fillStyle = progress > 0.45 ? "#ff3030" : "#ffffff";
        ctx.fill();
      }
      ctx.restore();
    }

    function drawChargedSlashFx(vx, vy, vw, vh) {
      if (!chargedSlashFx.length) return;
      ctx.save();
      for (const fx of chargedSlashFx) {
        const age = 1 - fx.t / fx.max;
        const forward = { x: Math.sin(fx.yaw), z: -Math.cos(fx.yaw) };
        const right = { x: Math.cos(fx.yaw), z: Math.sin(fx.yaw) };
        const range = fx.range || CHARGED_SLASH_RANGE;
        const dist = 7 + age * Math.max(12, range - 7);
        const cx = fx.x + forward.x * dist;
        const cz = fx.z + forward.z * dist;
        const bladeWidth = 5.8 + Math.sin(age * Math.PI) * 1.4;
        const a = project3D(cx - right.x * bladeWidth, 2.0, cz - right.z * bladeWidth, vx, vy, vw, vh);
        const b = project3D(cx + right.x * bladeWidth, 2.0, cz + right.z * bladeWidth, vx, vy, vw, vh);
        const c = project3D(cx, 2.0 + Math.sin(age * Math.PI) * 4.2, cz, vx, vy, vw, vh);
        if (!a || !b || !c) continue;
        const alpha = clamp(fx.t / fx.max, 0, 1);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = "#ffffff";
        ctx.fillStyle = "rgba(255,255,102,0.20)";
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 34;
        ctx.lineWidth = 7 + Math.sin(age * Math.PI) * 8;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.quadraticCurveTo(c.x, c.y, b.x, b.y);
        ctx.stroke();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y + 10);
        ctx.quadraticCurveTo(c.x, c.y - 8, b.x, b.y + 10);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawFirewall(fw, vx, vy, vw, vh) {
      const left = project3D(-14, 0, fw.z, vx, vy, vw, vh);
      const right = project3D(14, 6, fw.z, vx, vy, vw, vh);
      const h1 = project3D(fw.holeX - 1.5, 1, fw.z - 0.05, vx, vy, vw, vh);
      const h2 = project3D(fw.holeX + 1.5, 4, fw.z - 0.05, vx, vy, vw, vh);
      if (!left || !right) return;
      ctx.save();
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 3;
      ctx.fillRect(Math.min(left.x, right.x), Math.min(left.y, right.y), Math.abs(right.x - left.x), Math.abs(right.y - left.y));
      ctx.strokeRect(Math.min(left.x, right.x), Math.min(left.y, right.y), Math.abs(right.x - left.x), Math.abs(right.y - left.y));
      if (h1 && h2) {
        ctx.clearRect(Math.min(h1.x, h2.x), Math.min(h1.y, h2.y), Math.abs(h2.x - h1.x), Math.abs(h2.y - h1.y));
        ctx.strokeRect(Math.min(h1.x, h2.x), Math.min(h1.y, h2.y), Math.abs(h2.x - h1.x), Math.abs(h2.y - h1.y));
      }
      ctx.restore();
    }

    function drawGate3D(x, z, vx, vy, vw, vh, color = "#fff", active = true) {
      const p = project3D(x, 2.6, z, vx, vy, vw, vh);
      if (!p) return;
      ctx.strokeStyle = active ? color : "rgba(255,255,255,0.38)";
      ctx.lineWidth = 4;
      ctx.shadowColor = active ? color : "transparent";
      ctx.shadowBlur = active ? 18 : 0;
      const r = clamp(p.s * 2, 20, 130);
      ctx.beginPath();
      ctx.rect(p.x - r * 0.92, p.y - r * 1.2, r * 1.84, r * 2.4);
      ctx.stroke();
      for (let i = 0; i < 6; i++) {
        const y = p.y - r * 1.05 + i * r * 0.42;
        line(p.x - r * 0.92, y, p.x - r * 0.62, y + r * 0.18, active ? color : "rgba(255,255,255,0.28)", 1.5);
        line(p.x + r * 0.92, y, p.x + r * 0.62, y + r * 0.18, active ? color : "rgba(255,255,255,0.28)", 1.5);
      }
      if (!active) {
        ctx.shadowBlur = 0;
        return;
      }
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, r * (0.75 + i * 0.24), r * (1.1 - i * 0.1), Math.sin(gameTime * 2) * 0.15, 0, Math.PI * 2);
        ctx.stroke();
      }
      for (let i = 0; i < 10; i++) {
        const a = i / 10 * Math.PI * 2 + gameTime * 2;
        line(p.x + Math.cos(a) * r * 0.5, p.y + Math.sin(a) * r * 0.85, p.x + Math.cos(a) * r * 1.05, p.y + Math.sin(a) * r * 1.25, color, 2);
      }
      ctx.shadowBlur = 0;
    }

    function drawFog(fog, vx, vy, vw, vh) {
      const p = project3D(0, 2, 12 - fog, vx, vy, vw, vh);
      if (!p) return;
      ctx.save();
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = "#000";
      ctx.fillRect(vx, vy, vw, H);
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 2;
      line(vx, p.y, vx + vw, p.y + Math.sin(gameTime * 8) * 10, "#fff", 2);
      ctx.restore();
    }

    function drawCrosshair(vx, vy, vw, vh) {
      const cx = vx + vw / 2;
      const cy = vy + vh / 2;
      const hasTarget = room && getSlashTarget(room);
      const parryReady = hasParryOpportunity();

      line(cx - 16, cy, cx - 5, cy, c, 1.5);
      line(cx + 5, cy, cx + 16, cy, c, 1.5);

      line(cx, cy + 5, cx, cy + 16, c, 1.5);
      drawDashCooldownBar(cx, cy);
      if (parryReady) {
        const a = 0.55 + Math.sin(gameTime * 22) * 0.25;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = "#ff8a2a";
        ctx.shadowColor = "#ff8a2a";
        ctx.shadowBlur = 12;
        ctx.lineWidth = 2;
        line(cx - 28, cy - 22, cx - 15, cy - 22, "#ff8a2a", 2);
        line(cx - 28, cy - 22, cx - 28, cy - 9, "#ff8a2a", 2);
        line(cx + 28, cy - 22, cx + 15, cy - 22, "#ff8a2a", 2);
        line(cx + 28, cy - 22, cx + 28, cy - 9, "#ff8a2a", 2);
        line(cx - 28, cy + 22, cx - 15, cy + 22, "#ff8a2a", 2);
        line(cx - 28, cy + 22, cx - 28, cy + 9, "#ff8a2a", 2);
        line(cx + 28, cy + 22, cx + 15, cy + 22, "#ff8a2a", 2);
        line(cx + 28, cy + 22, cx + 28, cy + 9, "#ff8a2a", 2);
        line(cx - 10, cy, cx + 10, cy, "#ff8a2a", 1.5);
        ctx.restore();
      }
    }

    function drawDashCooldownBar(cx, cy) {
      const maxCd = 1.2;
      const ready = player.dashCd <= 0;
      const ratio = ready ? 1 : clamp(1 - player.dashCd / maxCd, 0, 1);
      const x = cx - 58;
      const y = cy - 24;
      const w = 7;
      const h = 48;
      ctx.save();
      ctx.strokeStyle = ready ? "#fff" : "#66ffff";
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = ready ? 8 : 13;
      ctx.lineWidth = 1.5;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = ready ? "#fff" : "#66ffff";
      ctx.globalAlpha = ready ? 0.92 : 0.82;
      const fillH = Math.max(0, h - 6) * ratio;
      ctx.fillRect(x + 2, y + h - 3 - fillH, w - 4, fillH);
      ctx.globalAlpha = 1;
      for (let i = 1; i < 4; i++) line(x, y + i * h / 4, x + w, y + i * h / 4, "rgba(255,255,255,0.28)", 0.8);
      ctx.font = "700 10px Consolas, monospace";
      ctx.textAlign = "right";
      ctx.fillStyle = "#fff";
      ctx.shadowBlur = 8;
      ctx.fillText(ready ? "F" : player.dashCd.toFixed(1), x - 5, y + h / 2 + 4);
      ctx.restore();
    }

    function drawPointerLockHint(vx, vy, vw, vh) {
      if (pointer.locked || !is3DPointerState()) return;
      const cx = vx + vw / 2;
      const cy = vy + vh / 2 + 46;
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = "12px Consolas, monospace";
      ctx.fillStyle = "rgba(255,255,255,0.72)";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 8;
      ctx.fillText(lang === "ko" ? "클릭해서 마우스 고정" : "CLICK TO LOCK MOUSE", cx, cy);

    function drawBossAftermathHint(bossData, vx, vy, vw, vh) {
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = "700 15px Consolas, monospace";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 12;
      ctx.fillStyle = "#fff";
      if (bossData.defeated && !bossData.deathSettled) {
        ctx.fillText(msg("bossFracturing"), vx + vw / 2, vy + 48);
      } else if (!bossData.hasUsb && bossData.usb?.active) {
        ctx.fillText(msg("usbDropped"), vx + vw / 2, vy + 48);
      } else if (bossData.hasUsb) {
        const near = bossData.device?.active && len(player.px - bossData.device.x, player.pz - bossData.device.z) < 4.8;
        ctx.fillText(near ? msg("deployVaccine") : msg("approachDevice"), vx + vw / 2, vy + 48);
      }
      ctx.restore();
    }

    function getSlashTarget(roomData) {
      const forward = { x: Math.sin(camera3D.yaw), z: -Math.cos(camera3D.yaw) };
      const vp = current3DViewport();
      const cx = vp.x + vp.w / 2;
      const cy = vp.y + vp.h / 2;
      let best = null;
      for (const e of roomData.enemies) {
        if (!e.alive) continue;
        if (e.type === "drone") continue;
        if (e.guardT > 0) continue;
        const dx = e.x - player.px, dz = e.z - player.pz;
        const d = len(dx, dz);
        const dot = (dx / (d || 1)) * forward.x + (dz / (d || 1)) * forward.z;
        if (d < 3.45 && dot > Math.cos(Math.PI / 3.1)) {
          const p = project3D(e.x, e.y || 1, e.z, vp.x, vp.y, vp.w, vp.h);
          const screenDist = p ? Math.hypot(p.x - cx, p.y - cy) : 9999;
          const maxScreenDist = p ? clamp(p.s * 2.8, 54, 135) : 0;
          if (screenDist <= maxScreenDist && (!best || d < best.d || (d === best.d && screenDist < best.screenDist))) {
            best = { e, d, dot, screenDist };
          }
        }
      }
      return best;
    }

    function drawSlashTargetHint(roomData, vx, vy, vw, vh) {
      const target = getSlashTarget(roomData);
      if (!target) return;
      const p = project3D(target.e.x, target.e.y || 1, target.e.z, vx, vy, vw, vh);
      if (!p) return;
      const s = clamp(p.s * 1.9, 18, 90);
      ctx.save();
      ctx.strokeStyle = "#ffffff";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 16;
      ctx.lineWidth = 3;
      line(p.x - s, p.y - s, p.x - s * 0.45, p.y - s, "#ffffff", 3);
      line(p.x - s, p.y - s, p.x - s, p.y - s * 0.45, "#ffffff", 3);
      line(p.x + s, p.y - s, p.x + s * 0.45, p.y - s, "#ffffff", 3);
      line(p.x + s, p.y - s, p.x + s, p.y - s * 0.45, "#ffffff", 3);
      line(p.x - s, p.y + s, p.x - s * 0.45, p.y + s, "#ffffff", 3);
      line(p.x - s, p.y + s, p.x - s, p.y + s * 0.45, "#ffffff", 3);
      line(p.x + s, p.y + s, p.x + s * 0.45, p.y + s, "#ffffff", 3);
      line(p.x + s, p.y + s, p.x + s, p.y + s * 0.45, "#ffffff", 3);
      ctx.textAlign = "center";
      ctx.fillStyle = "#ffffff";
      ctx.font = "700 11px Consolas, monospace";
      ctx.fillText("SLASH", p.x, p.y - s - 10);
      ctx.restore();
    }

    function drawKatana(vx, vy, vw, vh) {
      const swing = player.slashT > 0 ? 1 - player.slashT / 0.2 : 0;
      const eased = 1 - Math.pow(1 - swing, 3);
      const cut = player.slashT > 0 ? Math.sin(swing * Math.PI) : 0;
      const parry = Math.max(player.parryT > 0 ? player.parryT / 0.13 : 0, (player.parryFxT || 0) / 0.28);
      const charge = clamp((player.chargedSlashHold || 0) / 1.5, 0, 1);
      const energized = player.bossPrototype && (player.swordEnergy || 0) > 0;
      const bladeLen = Math.min(vw, vh) * 0.42;
      const handleLen = Math.min(vw, vh) * 0.10;
      const idleAngle = -1.0;
      const angle = charge > 0 ? lerp(-1.35, -1.78, charge) : (parry > 0 ? -0.48 : (player.slashT > 0 ? lerp(-2.45, -1.05, eased) : idleAngle));
      const gripX = vx + vw * (0.78 - cut * 0.035 - parry * 0.12 - charge * 0.18);
      const gripY = vy + vh * (0.84 - cut * 0.055 - parry * 0.16 - charge * 0.10);
      const tipX = gripX + Math.cos(angle) * bladeLen;
      const tipY = gripY + Math.sin(angle) * bladeLen;
      const guardAngle = angle + Math.PI / 2;
      const nx = Math.cos(guardAngle), ny = Math.sin(guardAngle);
      const bladeW = (player.slashT > 0 ? 10 : 6);
      const baseW = bladeW * 0.8;
      const handleX = gripX - Math.cos(angle) * handleLen;
      const handleY = gripY - Math.sin(angle) * handleLen;
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.shadowColor = energized ? "#66ffff" : "#fff";
      ctx.shadowBlur = player.slashT > 0 ? 28 : (energized ? 24 : 10);
      line(handleX, handleY, gripX, gripY, "#000", 16);
      line(handleX, handleY, gripX, gripY, "#fff", 4);
      ctx.fillStyle = "#000";
      ctx.strokeStyle = energized ? "#66ffff" : "#fff";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(gripX + nx * baseW, gripY + ny * baseW);
      ctx.lineTo(tipX + nx * bladeW * 0.35, tipY + ny * bladeW * 0.35);
      ctx.lineTo(tipX, tipY);
      ctx.lineTo(tipX - nx * bladeW * 0.35, tipY - ny * bladeW * 0.35);
      ctx.lineTo(gripX - nx * baseW, gripY - ny * baseW);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.globalAlpha = 0.7;
      line(gripX + nx * 2, gripY + ny * 2, tipX - Math.cos(angle) * 18, tipY - Math.sin(angle) * 18, energized ? "#ffffff" : "#fff", energized ? 2 : 1.2);
      ctx.globalAlpha = 1;
      line(gripX - nx * 34, gripY - ny * 34, gripX + nx * 34, gripY + ny * 34, "#fff", 4);
      if (energized) {
        ctx.globalAlpha = 0.45 + Math.sin(gameTime * 18) * 0.18;
        for (let i = 0; i < 5; i++) {
          const u = ((i / 5) + gameTime * 0.85) % 1;
          const x1 = lerp(gripX, tipX, u);
          const y1 = lerp(gripY, tipY, u);
          line(x1 - nx * 16, y1 - ny * 16, x1 + nx * 16, y1 + ny * 16, i % 2 ? "#66ffff" : "#ffffff", 1.6 + charge * 2);
        }
        ctx.globalAlpha = 0.18 + charge * 0.45;
        ctx.strokeStyle = charge >= 1 ? "#ffffff" : "#66ffff";
        ctx.lineWidth = 5 + charge * 5;
        ctx.beginPath();
        ctx.arc(vx + vw / 2, vy + vh / 2, Math.min(vw, vh) * (0.16 + charge * 0.08), 0, Math.PI * 2);
        ctx.stroke();
      }
      if (parry > 0) {
        ctx.globalAlpha = 0.18 + parry * 0.35;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.arc(vx + vw / 2, vy + vh / 2, Math.min(vw, vh) * (0.18 + parry * 0.1), 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTransitionText(text, t) {
      ctx.save();
      ctx.globalAlpha = Math.sin(t * Math.PI);
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.font = "18px Consolas, monospace";
      ctx.fillText(text, W / 2, H * 0.22);

    function drawBossMaze() {
      ctx.save();
      const old = { x: camera2D.x, y: camera2D.y, z: camera2D.zoom };
      camera2D.x = player.x;
      camera2D.y = player.y;
      camera2D.zoom = 0.7;
      applyCamera2D();
      bossMaze.solids.forEach(r => drawDarkRect(r));
      bossMaze.breaks.forEach(b => {
        if (!b.open) {
          drawDarkRect(b);
          ctx.strokeStyle = "#fff";
          ctx.strokeRect(b.x, b.y, b.w, b.h);
        }
      });
      drawPortal2D(bossMaze.portal, "#ff2020");
      ctx.fillStyle = "#000";
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 4 / camera2D.zoom;
      ctx.beginPath();
      ctx.moveTo(0, bossMaze.spikeY);
      for (let x = 0; x < 1740; x += 70) {
        ctx.lineTo(x + 35, bossMaze.spikeY + 120);
        ctx.lineTo(x + 70, bossMaze.spikeY);
      }
      ctx.stroke();
      drawPlayer2D();
      camera2D.x = old.x; camera2D.y = old.y; camera2D.zoom = old.z;
      ctx.restore();
    }

    function drawEnding() {
      const flash = endingT < 0.7 && ((endingT * 15) | 0) % 2 === 0;
      ctx.fillStyle = flash || endingT > 0.7 ? "#fff" : "#000";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#000";
      ctx.textAlign = "center";
      ctx.font = "700 38px Consolas, monospace";
      ctx.fillText("DEBUG COMPLETE", W / 2, ending.creditsY);
      ctx.font = "16px Consolas, monospace";
      const stats = lastClearStats || { ms: Math.max(0, performance.now() - (runStartedAt || startTime)), deaths: runDeathCount };
      const lines = [
        "Vaccine_USB inserted",
        "Dark infection purged",
        `Clear time: ${formatRunTime(stats.ms)}`,
        `Deaths: ${stats.deaths}`,
        "Developer: @tq.limiter",
        `RANK: ${stats.deaths === 0 ? "SS" : "S"} (${stats.deaths} Errors)`,
        "",
        "RETURNING TO PURIFIED MENU"
      ];

    }

    function drawOverlay() {
      if (state === STATE_INTRO || state === STATE_OPENING || state === STATE_BOSS_DISCOVERY || state === STATE_EPILOGUE || state === STATE_ENDING || state === STATE_BAD_ENDING || state === STATE_EXITED) return;
      ctx.save();
      const cx = 36, cy = 36;
      ctx.strokeStyle = "#fff";
      ctx.fillStyle = "#fff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - 15);
      ctx.lineTo(cx + 18, cy);
      ctx.lineTo(cx, cy + 15);
      ctx.lineTo(cx - 8, cy);
      ctx.closePath();
      ctx.stroke();
      for (let i = 0; i < 10; i++) {
        ctx.globalAlpha = i < player.hp ? 1 : 0.18;
        ctx.fillRect(cx - 1, cy - 14 + i * 3, 2, 2);
      }
      ctx.globalAlpha = 1;
      ctx.textAlign = "right";
      ctx.font = "12px Consolas, monospace";
      ctx.fillText(state, W - 16, 24);
      ctx.fillText(`HP ${player.hp}/10`, W - 16, 42);
      if (devInvincible) {
        ctx.textAlign = "center";
        ctx.fillStyle = "#66ffff";
        ctx.shadowColor = "#66ffff";
        ctx.shadowBlur = 12;
        ctx.font = "700 12px Consolas, monospace";
        ctx.fillText("DEV INVINCIBLE", W / 2, H - 62);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff";
      }
      drawPlayerHealthBar();
      drawSwordEnergyHud();
      if (boss) drawBossHealthBar();
      if (state === STATE_GAME_3D_BYPASS && room) {
        ctx.textAlign = "center";
        ctx.font = "700 14px Consolas, monospace";
        if (room.tutorial) {
          ctx.fillStyle = room.gateOpen ? "#66ffff" : "rgba(102,255,255,0.9)";
          ctx.shadowColor = "#66ffff";
          ctx.shadowBlur = 12;
          ctx.fillText(room.gateOpen ? msg("trainingDone") : msg("training"), W / 2, H * 0.72);
          ctx.font = "12px Consolas, monospace";
          ctx.fillText(msg("noDamage"), W / 2, H * 0.72 + 22);
          const hold = clamp((room.skipHold || 0) / 3, 0, 1);
          ctx.fillStyle = hold > 0 ? "#ffffff" : "rgba(255,255,255,0.72)";
          ctx.shadowBlur = hold > 0 ? 16 : 6;
          ctx.fillText(msg("trainingSkip"), W / 2, H * 0.72 + 46);
          ctx.shadowBlur = 0;
          const bw = 190;
          const bh = 8;
          const bx = W / 2 - bw / 2;
          const by = H * 0.72 + 58;
          ctx.strokeStyle = "rgba(255,255,255,0.75)";
          ctx.lineWidth = 1.5;
          ctx.strokeRect(bx, by, bw, bh);
          ctx.fillStyle = hold >= 1 ? "#66ffff" : "rgba(102,255,255,0.75)";
          ctx.fillRect(bx + 2, by + 2, Math.max(0, (bw - 4) * hold), bh - 4);
          ctx.shadowBlur = 0;
        } else {
          const left = room.enemies.filter(e => e.alive).length;
          ctx.fillStyle = room.gateOpen ? "#fff" : "rgba(255,255,255,0.85)";
          ctx.fillText(room.gateOpen ? msg("exitOpen") : `${msg("purge")}: ${left}`, W / 2, 34);
          drawEnemyTypeLegend(room);
        }
      }
      drawScreenFx();
      if ((player.stun3D || 0) > 0 && is3DPointerState()) {
        drawChainBindWarning();
      }
      if (hasParryOpportunity()) {
        const a = 0.35 + Math.sin(gameTime * 18) * 0.14;
        drawParryFrame("#ff8a2a", a, 1);
      }
      if (parrySuccessT > 0) {
        ctx.globalAlpha = parrySuccessT / 0.45;
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 18;
        ctx.font = "700 28px Consolas, monospace";
        ctx.fillText("PARRY!", W / 2, H * 0.38);
        drawParryFrame("#ffffff", parrySuccessT / 0.45 * 0.85, 1.25);
      }
      if (parryFailT > 0) {
        ctx.globalAlpha = clamp(parryFailT / 0.45, 0.55, 1);
        ctx.textAlign = "center";
        ctx.fillStyle = "#ff3030";
        ctx.shadowColor = "#ff3030";
        ctx.shadowBlur = 16;
        ctx.font = "700 22px Consolas, monospace";
        ctx.fillText(`PARRY LOCKED ! ${Math.max(0, player.parryCd).toFixed(1)}s`, W / 2, H * 0.42);
      }
      if (hitFlash > 0) {
        ctx.globalAlpha = hitFlash / 0.35 * 0.32;
        ctx.fillStyle = "#ff2020";
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = hitFlash / 0.35 * 0.65;
        ctx.strokeStyle = "#ff2020";
        ctx.lineWidth = 18;
        ctx.strokeRect(8, 8, W - 16, H - 16);
      }
      ctx.restore();
    }

    function drawPlayerHealthBar() {
      const bw = Math.min(360, W * 0.38);
      const bh = 16;
      const bx = W / 2 - bw / 2;
      const by = H - 44;
      const hpRatio = clamp(player.hp / player.maxHp, 0, 1);
      const hpText = Number.isInteger(player.hp) ? `${player.hp}` : player.hp.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      ctx.save();
      ctx.globalAlpha = 0.94;
      ctx.shadowColor = hpRatio <= 0.25 ? "#ff3030" : "#fff";
      ctx.shadowBlur = hpRatio <= 0.25 ? 18 : 10;
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.strokeStyle = hpRatio <= 0.25 ? "#ff3030" : "rgba(255,255,255,0.9)";
      ctx.lineWidth = 2;
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = hpRatio <= 0.25 ? "#ff3030" : "#ffffff";
      ctx.fillRect(bx + 3, by + 3, Math.max(0, (bw - 6) * hpRatio), bh - 6);
      ctx.shadowBlur = 0;
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.font = "700 12px Consolas, monospace";
      ctx.fillStyle = hpRatio <= 0.25 ? "#ff8080" : "#ffffff";
      ctx.fillText(`HP ${hpText}/${player.maxHp}`, W / 2, by - 5);
      ctx.restore();
    }

    function drawSwordEnergyHud() {
      if (!player.bossPrototype || !isBossState()) return;
      const charges = player.swordEnergy || 0;
      const progress = clamp((player.chargedSlashHold || 0) / 1.5, 0, 1);
      const x = W / 2;
      const y = H - 82;
      ctx.save();
      ctx.textAlign = "center";
      ctx.font = "700 12px Consolas, monospace";
      ctx.fillStyle = charges > 0 ? "#66ffff" : "rgba(255,255,255,0.52)";
      ctx.shadowColor = charges > 0 ? "#66ffff" : "#fff";
      ctx.shadowBlur = charges > 0 ? 12 : 4;
      ctx.fillText(`SWORD ENERGY ${charges}/3  |  PARRY ${player.parryChargeCount || 0}/3`, x, y);
      if (charges > 0) {
        const bw = 220;
        const bh = 8;
        ctx.fillStyle = "rgba(0,0,0,0.78)";
        ctx.strokeStyle = "#66ffff";
        ctx.fillRect(x - bw / 2, y + 10, bw, bh);
        ctx.strokeRect(x - bw / 2, y + 10, bw, bh);
        ctx.fillStyle = progress >= 1 ? "#ffffff" : "#66ffff";
        ctx.fillRect(x - bw / 2 + 2, y + 12, Math.max(0, (bw - 4) * progress), bh - 4);
      }
      ctx.restore();
    }

    function drawChainBindWarning() {
      const t = clamp(player.stun3D || 0, 0, 1);
      const pulse = 0.72 + Math.sin(gameTime * 18) * 0.18;
      const bw = 300;
      const bh = 58;
      const bx = W / 2 - bw / 2;
      const by = H * 0.28;
      ctx.save();
      ctx.globalAlpha = clamp(0.65 + t * 0.35, 0, 1);
      ctx.fillStyle = "rgba(0,0,0,0.68)";
      ctx.strokeStyle = "#ff3030";
      ctx.shadowColor = "#ff3030";
      ctx.shadowBlur = 18 * pulse;
      ctx.lineWidth = 2;
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeRect(bx, by, bw, bh);
      ctx.textAlign = "center";
      ctx.fillStyle = "#ff6666";
      ctx.font = "700 18px Consolas, monospace";
      ctx.fillText(lang === "ko" ? "속박됨" : "CHAIN BOUND", W / 2, by + 25);
      ctx.font = "700 12px Consolas, monospace";
      ctx.fillStyle = "#fff";
      ctx.fillText(`${(player.stun3D || 0).toFixed(1)}s`, W / 2, by + 44);
      for (let i = 0; i < 5; i++) {
        const yy = by + 9 + i * 10;
        line(bx - 44, yy, bx + 34, yy + Math.sin(gameTime * 12 + i) * 8, "#ff3030", 2);
        line(bx + bw - 34, yy + Math.sin(gameTime * 11 + i) * 8, bx + bw + 44, yy, "#ff3030", 2);
      }
      ctx.restore();
    }

    function drawParryFrame(color, alpha, scale = 1) {
      ctx.save();
      ctx.globalAlpha = clamp(alpha, 0, 1);
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 18 * scale;
      ctx.lineWidth = 2.5 * scale;
      ctx.lineCap = "square";
      const padX = 18 * scale;
      const padY = 18 * scale;
      const left = padX;
      const right = W - padX;
      const top = padY;
      const bottom = H - padY;
      const corner = Math.min(W, H) * 0.095;
      const mid = W / 2;
      const dash = W * 0.13;
      const gap = W * 0.045;
      line(left, top, left + corner, top, color, ctx.lineWidth);
      line(left, top, left, top + corner * 0.72, color, ctx.lineWidth);
      line(right, top, right - corner, top, color, ctx.lineWidth);
      line(right, top, right, top + corner * 0.72, color, ctx.lineWidth);
      line(left, bottom, left + corner, bottom, color, ctx.lineWidth);
      line(left, bottom, left, bottom - corner * 0.72, color, ctx.lineWidth);
      line(right, bottom, right - corner, bottom, color, ctx.lineWidth);
      line(right, bottom, right, bottom - corner * 0.72, color, ctx.lineWidth);
      line(mid - dash - gap, top, mid - gap, top, color, ctx.lineWidth * 0.85);
      line(mid + gap, top, mid + dash + gap, top, color, ctx.lineWidth * 0.85);
      line(mid - dash * 0.75, top + 12 * scale, mid + dash * 0.75, top + 12 * scale, color, ctx.lineWidth * 0.55);
      line(mid - dash - gap, bottom, mid - gap, bottom, color, ctx.lineWidth * 0.85);
      line(mid + gap, bottom, mid + dash + gap, bottom, color, ctx.lineWidth * 0.85);
      line(mid - dash * 0.65, bottom - 12 * scale, mid + dash * 0.1, bottom - 12 * scale, color, ctx.lineWidth * 0.55);
      ctx.restore();
    }

    function drawBossHealthBar() {
      if (!boss || boss.defeated || !(state === STATE_BOSS_P1 || state === STATE_BOSS_P3)) return;
      const bw = Math.min(560, W * 0.62);
      const bh = 18;
      const x = W / 2 - bw / 2;
      const y = 18;
      const hpRatio = clamp(boss.hp / (boss.maxHp || 36), 0, 1);
      const towersLeft = aliveBossTowers();
      const towerTotal = boss.towers?.length || 0;
      ctx.save();
      ctx.textAlign = "center";
      ctx.shadowColor = boss.shielded ? "#ff3030" : "#ff3030";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.strokeStyle = boss.shielded ? "#ff3030" : "#fff";
      ctx.lineWidth = 2;
      ctx.fillRect(x, y, bw, bh);
      ctx.strokeRect(x, y, bw, bh);
      ctx.fillStyle = boss.shielded ? "rgba(255,48,48,0.30)" : "rgba(255,48,48,0.86)";
      ctx.fillRect(x + 2, y + 2, Math.max(0, bw - 4) * hpRatio, bh - 4);
      if (boss.shielded) {
        ctx.strokeStyle = "#ff3030";
        for (let i = 0; i < towerTotal; i++) {
          const tx = x + 8 + i * ((bw - 16) / Math.max(1, towerTotal));
          ctx.globalAlpha = i < towersLeft ? 1 : 0.22;
          ctx.strokeRect(tx, y + bh + 8, Math.min(34, (bw - 22) / Math.max(1, towerTotal) - 4), 8);
        }
        ctx.globalAlpha = 1;
      }
      ctx.fillStyle = "#fff";
      ctx.shadowBlur = 10;
      ctx.font = "700 13px Consolas, monospace";
      const shieldText = boss.shielded
        ? (lang === "ko" ? `보호막 ${towersLeft}/${towerTotal}` : `SHIELD ${towersLeft}/${towerTotal}`)
        : (lang === "ko" ? "보호막 파괴" : "SHIELD BROKEN");
      const phaseText = lang === "ko" ? `${boss.towerPhase || 1}\ud398\uc774\uc988` : `PHASE ${boss.towerPhase || 1}`;
      ctx.fillText(`CORE_VIRUS   ${phaseText}   ${Math.ceil(boss.hp)}/${boss.maxHp || 36}   ${shieldText}`, W / 2, y - 4);
      const introNotice = (boss.introNoticeT || 0) > 0 ? msg("bossShieldHint") : "";
      const shieldBrokenNotice = ((boss.skillNoticeT || 0) > 0 && boss.skillName === msg("bossShieldBroken")) ? boss.skillName : "";
      const noticeText = introNotice || shieldBrokenNotice;
      if (noticeText) {
        ctx.globalAlpha = introNotice ? clamp(boss.introNoticeT / 0.8, 0.65, 1) : clamp(boss.skillNoticeT, 0, 1);
        ctx.fillStyle = noticeText === msg("bossShieldBroken") ? "#ff3030" : "#ffffff";
        ctx.shadowColor = ctx.fillStyle;
        ctx.font = "700 18px Consolas, monospace";
        wrapText(noticeText, W / 2, y + 54, Math.min(760, W * 0.82), 22, "center");
      }
      ctx.restore();
    }

    function drawEnemyTypeLegend(roomData) {
      const aliveTypes = [...new Set(roomData.enemies.filter(e => e.alive).map(e => e.type === "miniDrone" ? "drone" : e.type))];
      if (!aliveTypes.length) return;
      const typeOrder = ["cube", "shield", "chain", "brute", "drone"];
      const visibleTypes = typeOrder.filter(t => aliveTypes.includes(t));
      const names = { cube: "CUBE", shield: "SHIELD", chain: "CHAIN", brute: "BRUTE", drone: "DRONE" };
      const keys = { cube: "enemyCube", shield: "enemyShield", chain: "enemyChain", brute: "enemyBrute", drone: "enemyDrone" };
      ctx.save();
      const x = 18;
      const y = 72;
      const w = Math.min(430, W * 0.42);
      const h = 52 + visibleTypes.length * 46;
      ctx.textAlign = "left";
      ctx.fillStyle = "rgba(0,0,0,0.62)";
      ctx.strokeStyle = "rgba(255,255,255,0.72)";
      ctx.shadowColor = "#fff";
      ctx.shadowBlur = 9;
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#fff";
      ctx.font = "700 14px Consolas, monospace";
      ctx.fillText(msg("enemyLegendTitle"), x + 16, y + 26);
      ctx.font = "12px Consolas, monospace";
      visibleTypes.forEach((type, i) => {
        const yy = y + 52 + i * 46;
        ctx.fillStyle = type === "brute" ? "#ff6666" : (type === "drone" ? "#66ffff" : "#fff");
        ctx.fillText(names[type], x + 16, yy);
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        wrapText(msg(keys[type]), x + 92, yy, w - 110, 16, "left");
      });
      ctx.restore();
    }

    function drawGameOver() {
      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.font = "700 46px Consolas, monospace";
      ctx.fillText(msg("halted"), W / 2, H / 2 - 20);
      ctx.font = "15px Consolas, monospace";
      ctx.fillText(msg("reboot"), W / 2, H / 2 + 28);
    }

    function line(x1, y1, x2, y2, color, width) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
