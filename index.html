    function rebuildMainMapLayout() {
      const mainFloors = floors.filter(f => f.h >= 70);
      const supportFloors = floors.filter(f => f.h < 70);
      const cleanedSupports = [];
      for (const s of supportFloors) {
        const tooCloseToMain = mainFloors.some(f =>
          s.x < f.x + f.w + 70 &&
          s.x + s.w > f.x - 70 &&
          Math.abs((s.y + s.h) - f.y) < 190
        );
        const overlapsSupport = cleanedSupports.some(o =>
          s.x < o.x + o.w + 120 &&
          s.x + s.w > o.x - 120 &&
          Math.abs(s.y - o.y) < 95
        );
        if (!tooCloseToMain && !overlapsSupport) cleanedSupports.push(s);
      }
      floors = [...mainFloors, ...cleanedSupports];
    }

    function nearestFloorUnder(x) {
      let best = null;
      let bestDx = Infinity;
      for (const f of floors) {
        if (x >= f.x - 80 && x <= f.x + f.w + 80) {
          const dx = Math.abs(x - (f.x + f.w / 2));
          if (dx < bestDx) { best = f; bestDx = dx; }
        }
      }
      return best;
    }

        if (f && d.y + d.h > f.y - 10 && d.y < f.y + f.h) d.y = f.y - d.h - 8;
      }
      for (const p of inversionPads) {
        const f = nearestFloorUnder(p.x + p.w / 2);
        if (f) p.y = f.y - p.h - 2;
      }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
      if (!bgmNodes) startBgm();
    }

    function startBgm() {
      if (!audioCtx) return;
      const master = audioCtx.createGain();
      master.gain.value = 0.047;
      master.connect(audioCtx.destination);
      const bass = audioCtx.createOscillator();
      const bassGain = audioCtx.createGain();
      bass.type = "sawtooth";
      bass.frequency.value = 55;
      bassGain.gain.value = 0.55;
      bass.connect(bassGain).connect(master);
      bass.start();
      const pulse = audioCtx.createOscillator();
      const pulseGain = audioCtx.createGain();
      pulse.type = "square";
      pulse.frequency.value = 110;
      pulseGain.gain.value = 0.0;
      pulse.connect(pulseGain).connect(master);
      pulse.start();
      const timer = setInterval(() => {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        pulse.frequency.setValueAtTime([110, 82, 146, 98][Math.floor(gameTime * 2) % 4], t);
        pulseGain.gain.cancelScheduledValues(t);
        pulseGain.gain.setValueAtTime(0.0, t);
        pulseGain.gain.linearRampToValueAtTime(0.35, t + 0.02);
        pulseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      }, 420);
      bgmNodes = { master, bass, bassGain, pulse, pulseGain, timer };
    }

    function beep(freq, dur = 0.08, type = "square", volume = 0.08, slide = 1) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      osc.frequency.exponentialRampToValueAtTime(Math.max(20, freq * slide), t + dur);
      gain.gain.setValueAtTime(volume * VOLUME_BOOST, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur + 0.02);
    }

    function noiseBurst(dur = 0.08, volume = 0.05) {
      if (!audioCtx) return;
      const length = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
      const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      const src = audioCtx.createBufferSource();
      const gain = audioCtx.createGain();
      gain.gain.value = volume * VOLUME_BOOST;
      src.buffer = buffer;
      src.connect(gain).connect(audioCtx.destination);
      src.start();
    }

    function burst(x, y, color = "#fff", count = 18, power = 260) {
      const maxParticles = 240;
      if (screenFx.length > maxParticles - count) screenFx.splice(0, screenFx.length - (maxParticles - count));
      for (let i = 0; i < count; i++) {
        const a = Math.PI * 2 * i / count + Math.random() * 0.5;
        const s = power * (0.35 + Math.random() * 0.8);
        screenFx.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, t: 0.45 + Math.random() * 0.25, max: 0.7, color });
      }
    }

    function addShake(power = 8, duration = 0.18) {
      screenShake.power = Math.max(screenShake.power, power);
      screenShake.t = Math.max(screenShake.t, duration);
      screenShake.max = Math.max(screenShake.max, duration);
    }

    function updateScreenFx(dt) {
      for (const p of screenFx) {
        p.t -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.82, dt * 60);
        p.vy *= Math.pow(0.82, dt * 60);
      }
      for (let i = screenFx.length - 1; i >= 0; i--) if (screenFx[i].t <= 0) screenFx.splice(i, 1);
    }

    function drawScreenFx() {
      ctx.save();
      ctx.lineCap = "round";
      for (const p of screenFx) {
        const a = clamp(p.t / p.max, 0, 1);
        ctx.globalAlpha = a;
        line(p.x, p.y, p.x - p.vx * 0.035, p.y - p.vy * 0.035, p.color, 2 + a * 2);
      }
      ctx.restore();
    }

    function landingAfterGate(gate) {
      const afterX = gate.x + gate.w + 80;
      return safeLandingPoint(afterX, gate.y, floors);

    function safeLandingPoint(targetX, preferredY, floorSet) {
      let best = null;
      let bestScore = Infinity;
      for (const f of floorSet) {
        const insideX = clamp(targetX, f.x + player.w + 8, f.x + f.w - player.w - 8);
        const dx = Math.abs(targetX - insideX);
        const dy = Math.abs(preferredY - f.y) * 0.35;
        const score = dx + dy;
        if (f.w >= player.w + 40 && score < bestScore) {
          best = { floor: f, x: insideX };
          bestScore = score;
        }
      }
      if (!best) {
        const f = floorSet[0];
        best = { floor: f, x: f.x + 60 };
      }
      return { x: best.x, y: best.floor.y - player.h - 3 };
    }

    function makeRoom(index) {
      const count = 3 + index * 2;
      const enemies = [];
      for (let i = 0; i < count; i++) {
        const a = i / count * Math.PI * 2 + index * 0.73;
        const type = ["brute", "shield", "cube", "chain", "drone"][(i + index) % 5];
        const ring = 8.5 + index * 2.8 + (i % 3) * 2.4;
        const laneOffset = ((i * 5 + index * 3) % 7 - 3) * 2.05;
        enemies.push({
          id: `room${index}-enemy${i}`,
          type,
          x: clamp(Math.cos(a) * ring + laneOffset, -13.5, 13.5),
          z: clamp(-10 - Math.sin(a) * (8.5 + index * 1.9) - i * 2.15, -35, -7),
          y: type === "drone" ? -4.2 : (type === "chain" ? 0.85 : 1),
          hp: type === "brute" ? 4 : (type === "chain" ? 2 : (type === "drone" ? 3 : 1)),
          armor: type === "shield",
          alive: true,
          stun: 0,
          shot: 0.5 + i * 0.3,
          lunge: 0,
          chainWindup: 0,
          chainTarget: null
        });
      }
      return {
        index,
        cleared: false,
        gateOpen: false,
        fog: 0,
        enemies,
        bullets: [],
        healthPickups: [],
        chainStrikes: [],
        pillars: [
          { x: -10, z: -10, h: 3 + index }, { x: 10, z: -16, h: 4 },
          { x: -7, z: -27, h: 5 }, { x: 8, z: -31, h: 2.5 + index }

        firewall: { z: -35, holeX: index % 2 ? -3 : 3, active: false },
        returnGate: { x: 0, z: -34 }
      };
    }

    function makeBossEntropyOrbs(count = 5, wave = 0) {
      const templates = [
        { baseX: -12, baseZ: -20, phase: 0.0 },
        { baseX: 10, baseZ: -26, phase: 1.3 },
        { baseX: -5, baseZ: -34, phase: 2.6 },

        { baseX: -16, baseZ: -50, phase: 5.2 },

        { baseX: -24, baseZ: -66, phase: 7.0 },
        { baseX: 6, baseZ: -74, phase: 8.2 }
      ];
      return templates.slice(0, count).map((m, i) => {
        const drift = wave * 7.5;
        const side = i % 2 ? 1 : -1;
        const baseX = clamp(m.baseX + side * drift, -58, 58);
        const baseZ = clamp(m.baseZ - wave * 12 - i * 1.5, -190, -18);
        return {
        x: baseX,
        z: baseZ,
        baseX,
        baseZ,
        y: 1.15,
        alive: true,
        armed: true,
        vx: 0,
        vz: 0,
        phase: m.phase + wave * 0.9,
        orbitR: 10 + i * 3.2 + wave * 2.4,
        orbitSquash: 0.68 + (i % 3) * 0.08,
        orbitSpeed: 0.42 + i * 0.045 + wave * 0.035,
        cooldown: 1.8 + i * 0.7,
        warn: 0,
        target: null,
        hostile: false,
        launchedByPlayer: false,
        life: 0
      };
      });
    }

    function spawnBossEntropyWave(count = 3) {
      if (!boss) return;
      boss.mines = boss.mines || [];
      const wave = boss.entropyWave || 1;
      boss.entropyWave = wave + 1;
      boss.mines.push(...makeBossEntropyOrbs(count, wave));
      boss.skillName = lang === "ko" ? "\uc5d4\ud2b8\ub85c\ud53c \uad6c\uccb4 \uc18c\ud658" : "ENTROPY ORBS SUMMONED";
      boss.skillNoticeT = Math.max(boss.skillNoticeT || 0, 1.1);
      beep(240, 0.18, "sawtooth", 0.07, 1.7);
      burst(W / 2, H * 0.38, "#ffffff", 34, 520);
      addShake(14, 0.2);
    }

    function reset3DView() {
      camera3D.yaw = 0;
      camera3D.pitch = -0.08;
      pointer.dx = 0;
      pointer.dy = 0;
      mouse.x = W / 2;
      mouse.y = H / 2;
    }

    function finishGame() {
      release3DPointerLock();
      state = STATE_EPILOGUE;
      storyT = 0;
      beep(80, 0.7, "sawtooth", 0.05, 2.4);
    }

    function defeatBoss() {
      if (!boss || boss.defeated) return;
      boss.deathState = state;
      boss.defeated = true;
      boss.deathT = 0;
      boss.shielded = false;
      boss.hp = 0;
      boss.bullets.length = 0;
      boss.lasers.length = 0;
      boss.chainStrikes.length = 0;
      boss.mines.forEach(m => m.alive = false);
      boss.usb = { x: 0, y: 1.15, z: -13, active: false };
      boss.device = { x: 0, y: 2.8, z: -64, active: false };
      boss.doorOpen = false;
      bossFlash = 0.5;
      beep(70, 0.7, "sawtooth", 0.085, 3.2);
      noiseBurst(0.35, 0.1);
      const p = bossFxPoint();
      burst(p.x, p.y, "#ff3030", 72, 720);
      burst(p.x, p.y, "#ffffff", 48, 580);
      addShake(36, 0.9);
    }

    function startVaccineCinematic() {
      release3DPointerLock();
      if (!lastClearStats) {
        const elapsed = Math.max(0, performance.now() - (runStartedAt || startTime));
        lastClearStats = { ms: elapsed, deaths: runDeathCount };
      }
      state = STATE_EPILOGUE;
      storyT = 0;
      beep(1000, 0.18, "triangle", 0.07, 0.5);
      noiseBurst(0.18, 0.05);
      addShake(16, 0.3);
    }

    function enterCredits() {
      release3DPointerLock();
      state = STATE_ENDING;
      endingT = 0;
      ending.creditsY = H + 80;
    }

    function update(dt) {
      gameTime += dt;
      if (pauseMenu.active) {
        mouse.justDown = false;
        mouse.justRight = false;
        pointer.dx = 0;
        pointer.dy = 0;
        return;
      }
      if (!is3DPointerState() && pointer.locked) release3DPointerLock();
      pointer.dx = clamp(pointer.dx, -80, 80);
      pointer.dy = clamp(pointer.dy, -80, 80);
      player.invuln = Math.max(0, player.invuln - dt);
      player.dashCd = Math.max(0, player.dashCd - dt);
      player.dashT = Math.max(0, player.dashT - dt);
      player.parryCd = Math.max(0, player.parryCd - dt);
      player.parryT = Math.max(0, player.parryT - dt);
      player.parryFxT = Math.max(0, (player.parryFxT || 0) - dt);
      player.stun3D = Math.max(0, (player.stun3D || 0) - dt);
      player.slashT = Math.max(0, player.slashT - dt);
      player.slashCd = Math.max(0, (player.slashCd || 0) - dt);
      player.corruption = Math.max(0, player.corruption - dt * 1.7);
      camera3D.fov = lerp(camera3D.fov, camera3D.fovTarget, Math.min(1, dt * 8));
      whiteout = Math.max(0, whiteout - dt);
      phaseBlackout = Math.max(0, phaseBlackout - dt);
      bossFlash = Math.max(0, bossFlash - dt);
      hitFlash = Math.max(0, hitFlash - dt);
      glitchBlind = Math.max(0, glitchBlind - dt);
      parrySuccessT = Math.max(0, parrySuccessT - dt);
      parryFailT = Math.max(0, parryFailT - dt);
      screenShake.t = Math.max(0, screenShake.t - dt);
      if (screenShake.t <= 0) {
        screenShake.power = 0;
        screenShake.max = 0;
      }
      updateScreenFx(dt);
      for (const fx of chargedSlashFx) fx.t -= dt;
      for (let i = chargedSlashFx.length - 1; i >= 0; i--) if (chargedSlashFx[i].t <= 0) chargedSlashFx.splice(i, 1);

      if (tutorialPause) {
        tutorialPause.t -= dt;
        if (tutorialPause.t <= 0) tutorialPause = null;
        keys.clear();
        mouse.down = false;
        mouse.right = false;
        mouse.justDown = false;
        mouse.justRight = false;
        pointer.dx = 0;
        pointer.dy = 0;
        return;
      }

      if (state === STATE_GAME_2D) update2D(dt, floors, walls);
      if (state === STATE_TUTORIAL) update2D(dt, tutorialFloors, tutorialWalls);
      if (state === STATE_HOOK_PRACTICE) update2D(dt, practiceFloors, practiceWalls);
      if (state === STATE_OPENING) updateOpening(dt);
      if (state === STATE_GAME_3D_BYPASS) update3DBypass(dt);
      if (state === STATE_BOSS_DISCOVERY) updateBossDiscovery(dt);
      if (state === STATE_BOSS_P1) updateBossP1(dt);
      if (state === STATE_BOSS_P2) updateBossMaze(dt);
      if (state === STATE_BOSS_P3) updateBossP3(dt);
      if (state === STATE_EPILOGUE) updateEpilogue(dt);
      if (state === STATE_ENDING) updateEnding(dt);
      if (state === STATE_BAD_ENDING) updateBadEnding(dt);

      finishMissedParry();
      mouse.justDown = false;
      mouse.justRight = false;
      pointer.dx = 0;
      pointer.dy = 0;
    }

    function finishMissedParry() {
      if (!player.parryPending || player.parryT > 0) return;
      player.parryPending = false;
      player.parryCd = Math.max(player.parryCd, 1.0);
      parryFailT = Math.max(parryFailT, player.parryCd);
      beep(160, 0.12, "sawtooth", 0.045, 0.45);
      burst(W / 2, H * 0.42, "#ff3030", 18, 280);
      addShake(6, 0.14);
    }

    function update2D(dt, solidFloors, solidWalls) {
      const speed = 1400;
      const accel = 3500;
      const left = keys.has("KeyA");
      const right = keys.has("KeyD");
      if (!player.hook) {
        if (left) { player.vx -= accel * dt; player.facing = -1; }
        if (right) { player.vx += accel * dt; player.facing = 1; }
      } else {
        if (left) player.facing = -1;
        if (right) player.facing = 1;
      }
      const aim2D = screenToWorld(mouse.x, mouse.y);
      player.aimAngle = Math.atan2(aim2D.y - (player.y + player.h / 2), aim2D.x - (player.x + player.w / 2));
      if (Math.abs(aim2D.x - (player.x + player.w / 2)) > 4) {
        player.facing = aim2D.x >= player.x + player.w / 2 ? 1 : -1;
      }
      player.hookLaunchT = Math.max(0, (player.hookLaunchT || 0) - dt);
      if (!player.hook && !left && !right && !player.hookLaunchT) player.vx *= Math.pow(0.8, dt * 60);
      if (!player.hookLaunchT) player.vx = clamp(player.vx, -speed, speed);

      if (keys.has("Space") && !player.jumpHeld) {
        if (player.hook) {
          hookHop();
        } else if (player.onGround) {
          player.vy = world.gravity > 0 ? JUMP_FORCE_2D : -JUMP_FORCE_2D;
          player.onGround = false;
          beep(300, 0.06, "triangle", 0.035, 1.6);
        } else if (player.wall) {
          player.vx = -player.wall * 900;
          player.vy = world.gravity > 0 ? WALL_JUMP_Y_2D : -WALL_JUMP_Y_2D;
          beep(360, 0.07, "triangle", 0.04, 1.8);
        }
      }
      player.jumpHeld = keys.has("Space");

      if (mouse.justDown && !player.hook) tryHook();
      if (mouse.justRight && player.hook) startHookPowerSwing();
      if (player.hook && (mouse.down || player.hook.powerSwing)) updateHook(dt);

      player.vy += world.gravity * dt;
      move2D(dt, solidFloors, solidWalls);
      if (player.hook) keepHookTautAfterTerrain();
      updatePlayerTrail(dt);

      if (state === STATE_GAME_2D) {
        if ((player.hook || player.y < camera2D.y - 180) && gameTime % 1.85 < dt) {
          skyLasers.push({ x: player.x, t: 1.22, warn: 0.38, hit: false });
        }
        if ((player.hook || player.y < camera2D.y - 220) && gameTime % 2.4 < dt) {
          sideLasers.push({ y: player.y, dir: Math.random() < 0.5 ? -1 : 1, t: 1.32, warn: 0.44, hit: false });
        }
        for (const lz of skyLasers) {
          lz.t -= dt;
          if (!lz.hit && lz.t < lz.warn) {
            if (!lz.fired) {
              lz.fired = true;
              beep(1280, 0.06, "square", 0.045, 0.7);
            }
            const beam = rect(lz.x - 16, -200, 32, world.h + 300);
            if (aabb(playerBox(), beam)) {
              damage(0.5);
              lz.hit = true;
            }
          }
        }
        for (let i = skyLasers.length - 1; i >= 0; i--) if (skyLasers[i].t <= 0) skyLasers.splice(i, 1);
        for (const lz of sideLasers) {
          lz.t -= dt;
          if (!lz.hit && lz.t < lz.warn) {
            if (!lz.fired) {
              lz.fired = true;
              beep(1180, 0.07, "square", 0.045, 0.75);
            }
            const beam = rect(camera2D.x - W / camera2D.zoom - 200, lz.y - 14, W / camera2D.zoom * 2 + 400, 28);
            if (aabb(playerBox(), beam)) {
              damage(0.5);
              lz.hit = true;
            }
          }
        }
        for (let i = sideLasers.length - 1; i >= 0; i--) if (sideLasers[i].t <= 0) sideLasers.splice(i, 1);

        for (const p of inversionPads) {
          if (!devInvincible && !p.used && aabb(playerBox(), p)) {
            p.used = true;
            world.gravity *= -1;
            player.vy = world.gravity > 0 ? -700 : 700;
          }
        }

        for (const d of deadSectors) {
          const on = ((gameTime + d.phase) % 1) < 0.52;
          if (on && aabb(playerBox(), d)) damage(2);
        }
        for (const w of waterfalls) {
          if (devInvincible) continue;
          if (aabb(playerBox(), w)) glitchBlind = Math.max(glitchBlind, 2.4);
        }
      } else if (!devInvincible && state === STATE_TUTORIAL && aabb(playerBox(), tutorialTrapSamples.waterfall)) {
        glitchBlind = Math.max(glitchBlind, 2.4);
      }

      if (state !== STATE_TUTORIAL && state !== STATE_HOOK_PRACTICE) {
        for (const e of enemies2D) {
          if (!e.alive) continue;
          if (!e.active) {
            if (len(player.x - e.x, player.y - e.y) < 1250) e.active = true;
            else continue;
          }
          const n = norm(player.x - e.x, player.y - e.y);
          e.x += n.x * 330 * dt;
          e.y += n.y * 330 * dt;
          if (len(player.x - e.x, player.y - e.y) < 24) {
            damage(0.25);
            e.alive = false;
          }
        }
      }

      chasingWall.fringe += dt * 30;
      if (state === STATE_GAME_2D) {
        const visibleLeft = camera2D.x - W / camera2D.zoom / 2;
        const offscreenGap = visibleLeft - chasingWall.x;
        const catchupBoost = offscreenGap > 260 ? clamp((offscreenGap - 260) * 0.55, 0, 520) : 0;
        chasingWall.x += (chasingWall.speed + catchupBoost) * dt;
        if (player.x < chasingWall.x + 58) damage(10);
      } else {
        chasingWall.x = Math.min(chasingWall.x, player.x - 900);
      }

      for (const g of gates) {
        if (state === STATE_GAME_2D && g.locked && aabb(playerBox(), g)) {
          enter3D(g);
        }
      }
      if (state === STATE_TUTORIAL && !trainingPortal.completed && aabb(playerBox(), trainingPortal)) {
        enterTraining3D();
      }
      if (state === STATE_TUTORIAL && trainingPortal.completed && aabb(playerBox(), tutorialExitPortal)) {
        enterMainMap();
      }
      if (state === STATE_TUTORIAL) {
        updateDevBossRift(dt);
        updateTutorialPrompts();
        updateTutorialEnemies(dt);
      }

      if (state === STATE_HOOK_PRACTICE) updateHookPractice(dt);

      if (state === STATE_GAME_2D && gates.every(g => g.cleared) && aabb(playerBox(), bossPortal2D)) startBossDiscovery();

      camera2D.x = lerp(camera2D.x, player.x + player.vx * 0.16, Math.min(1, dt * 4));
      camera2D.y = lerp(camera2D.y, player.y - 100, Math.min(1, dt * 4));
    }

    function updateDevBossRift(dt) {
      if (trainingPortal.completed) {
        devBossRift.hold = 0;
        devBossRift.open = false;
        devBossRift.seen = false;
        devBossRift.awaitRelease = false;
        devBossRift.enterHeld = false;
        return;
      }
      if (!devInvincible && !devBossRift.seen && !devBossRift.open) return;
      const near = aabb(playerBox(), rect(devBossRift.x - 120, devBossRift.y - 90, devBossRift.w + 240, devBossRift.h + 180));
      if (!devBossRift.open && near && keys.has("KeyE")) {
        devBossRift.hold = Math.min(5, devBossRift.hold + dt);
        if (devBossRift.hold >= 5) {
          devBossRift.open = true;
          devBossRift.awaitRelease = true;
          beep(70, 0.45, "sawtooth", 0.08, 2.6);
          noiseBurst(0.22, 0.08);
          burst(W / 2, H * 0.42, "#ff2020", 56, 620);
          addShake(22, 0.4);
        }
      } else if (!devBossRift.open) {
        devBossRift.hold = Math.max(0, devBossRift.hold - dt * 1.5);
      }
      if (devBossRift.open && !keys.has("KeyE")) devBossRift.awaitRelease = false;
      if (devBossRift.open && near && keys.has("KeyE") && !devBossRift.awaitRelease && !devBossRift.enterHeld) {
        startBossDiscovery();
      }
      devBossRift.enterHeld = keys.has("KeyE");
    }

    function queueTutorialPause(id, key, duration = 2.1) {
      if (tutorialStepSeen.includes(`|${id}|`)) return;
      if (tutorialStepSeenGlobal.includes(`|${id}|`)) return;
      tutorialStepSeen += `|${id}|`;
      tutorialStepSeenGlobal += `|${id}|`;
      tutorialPause = { t: duration, text: msg(key) };
      beep(520, 0.08, "triangle", 0.04, 1.3);
    }

    function queueTutorialText(id, textValue, duration = 1.8) {
      if (tutorialStepSeen.includes(`|${id}|`)) return false;
      if (tutorialStepSeenGlobal.includes(`|${id}|`)) return false;
      tutorialStepSeen += `|${id}|`;
      tutorialStepSeenGlobal += `|${id}|`;
      tutorialPause = { t: duration, text: textValue };
      beep(520, 0.08, "triangle", 0.04, 1.3);
      return true;
    }

    function updateTutorialPrompts() {
      if (player.x > 7600 && !trainingPortal.completed) queueTutorialPause("training", "pauseTraining");
      else if (trainingPortal.completed && player.x > 8500) {
        queueTutorialPause("exit", "pauseExit", 2.2);
      }
    }

    function updateTutorialEnemies(dt) {
      for (const e of tutorialEnemies) {
        if (!e.alive) continue;
        e.hitCd = Math.max(0, (e.hitCd || 0) - dt);
        if (e.retreat > 0) {
          e.retreat -= dt;
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          e.vx *= Math.pow(0.86, dt * 60);
          e.vy *= Math.pow(0.86, dt * 60);
        } else {
          const n = norm(player.x - e.x, player.y - e.y);
          e.x += n.x * 145 * dt;
          e.y += n.y * 145 * dt;
        }
        if (e.hitCd <= 0 && len(player.x - e.x, player.y - e.y) < 28) {
          const n = norm(e.x - player.x, e.y - player.y);
          e.vx = n.x * 520;
          e.vy = n.y * 300 - 160;
          e.hitCd = 0.7;
          e.retreat = 0.8;
          burst(W / 2, H / 2, "#66ffff", 14, 180);
          if (tutorialEnemyStage === 1 && e.lesson === 1) {
            e.alive = false;
            tutorialEnemyStage = 2;
            queueTutorialPause("enemy2", "pauseEnemy2", 2.6);
            tutorialEnemies.push({ x: player.x + 680, y: player.y - 120, r: 15, lesson: 2, alive: true, retreat: 0, vx: 0, vy: 0, hitCd: 0 });
          } else if (tutorialEnemyStage === 2 && e.lesson === 2) {
            e.alive = false;
            tutorialEnemyStage = 3;
            queueTutorialPause("exit", "pauseExit", 2.2);
          }
        }
      }
    }

    function playerBox() {
      return { x: player.x, y: player.y, w: player.w, h: player.h };
    }

    function solidsFor2D(baseFloors, baseWalls) {
      const gateWalls = state === STATE_GAME_2D ? gates.filter(g => g.locked).flatMap(g => gateBarrierRects(g)) : [];
      return [...baseFloors, ...baseWalls, ...gateWalls];
    }

    function gateBarrierRects(g) {
      const spanTop = 2400;
      const spanBottom = world.h + 2800;
      return [
        rect(g.x - 14, -spanTop, g.w + 28, g.y + spanTop),
        rect(g.x - 14, g.y + g.h, g.w + 28, spanBottom - (g.y + g.h))
      ];
    }

    function move2D(dt, baseFloors, baseWalls, rawSolids = false) {
      const solids = rawSolids ? [...baseFloors, ...baseWalls] : solidsFor2D(baseFloors, baseWalls);
      player.onGround = false;
      player.wall = 0;
      player.x += player.vx * dt;
      let box = playerBox();
      for (const s of solids) {
        if (!aabb(box, s)) continue;
        const wasHooked = !!player.hook;
        if (wasHooked && isHookCeilingBump(box, s)) {
          player.y = Math.max(player.y, s.y + s.h + 0.5);
          player.vy = Math.max(0, player.vy);
          stopHookOnTerrain("ceiling");
          box = playerBox();
          continue;
        }
        if (player.vx > 0) { player.x = s.x - player.w; player.wall = 1; }
        if (player.vx < 0) { player.x = s.x + s.w; player.wall = -1; }
        player.vx = 0;
        if (wasHooked) stopHookOnTerrain("x");
        box = playerBox();
      }

      player.y += player.vy * dt;
      box = playerBox();
      for (const s of solids) {
        if (!aabb(box, s)) continue;
        const wasHooked = !!player.hook;
        let hookHitAxis = "y";
        if (player.vy > 0) {
          player.y = s.y - player.h;
          player.onGround = world.gravity > 0;
        } else if (player.vy < 0) {
          player.y = s.y + s.h - (player.h - box.h);
          player.onGround = world.gravity < 0;
          hookHitAxis = "ceiling";
        }
        player.vy = 0;
        if (wasHooked) stopHookOnTerrain(hookHitAxis);
        box = playerBox();
      }
      if (player.y > world.h + 400 || player.y < -700) {
        if (state === STATE_TUTORIAL || state === STATE_HOOK_PRACTICE || devInvincible) {
          restorePlayerToSafe2DSpot(baseFloors);
        } else {
          damage(10);
        }
      }
    }

    function isHookCeilingBump(box, solid) {
      const solidBottom = solid.y + solid.h;
      const playerCenterY = box.y + box.h * 0.5;
      const headTouchesBottom = box.y < solidBottom && playerCenterY > solidBottom - 2;
      const notStandingOnTop = box.y + box.h > solidBottom + 4;
      return headTouchesBottom && notStandingOnTop;
    }

    function stopHookOnTerrain(axis) {
      if (player.hook && axis === "ceiling") {
        const d = len(player.hook.x - player.x, player.hook.y - player.y);
        if (player.hook.restoreLen === undefined || player.hook.ceilingNoPullT <= 0) {
          player.hook.restoreLen = player.hook.len;
        }
        player.hook.len = Math.max(player.hook.len, d);
        player.hook.ceilingBlockT = 0.18;
        player.hook.ceilingNoPullT = 0.18;
        player.hook.restoreDelayT = 0.08;
        player.vy = Math.max(player.vy, 0);
      } else if (player.hook && axis === "y") {
        const d = len(player.hook.x - player.x, player.hook.y - player.y);
        player.hook.len = Math.max(70, Math.min(player.hook.len, d));
      }
      beep(180, 0.035, "triangle", 0.018, 0.8);
    }

    function keepHookTautAfterTerrain() {
      const h = player.hook;
      if ((h.ceilingBlockT || 0) > 0) return;
      const d = len(h.x - player.x, h.y - player.y);
      if (d > h.len) {
        const nx = (h.x - player.x) / d;
        const ny = (h.y - player.y) / d;
        const dot = player.vx * nx + player.vy * ny;
        player.vx -= dot * nx;
        player.vy -= dot * ny;
        player.x = h.x - nx * h.len;
        player.y = h.y - ny * h.len;
        player.onGround = false;
        return;
      }
      if (player.onGround || (h.groundLift || 0) > 0) {
        h.len = Math.max(70, Math.min(h.len, d));
        if (player.onGround && (keys.has("KeyA") || keys.has("KeyD"))) {
          player.y -= 6;
          player.onGround = false;
          player.vy = Math.min(player.vy, -180);
        }
      }
    }

    function restorePlayerToSafe2DSpot(floorSet) {
      const safe = safeLandingPoint(player.x, player.y, floorSet?.length ? floorSet : floors);
      player.x = safe.x;
      player.y = safe.y;
      player.vx = 0;
      player.vy = 0;
      player.hook = null;
      world.gravity = 4500;
      addShake(5, 0.1);
      if (devInvincible) burst(W / 2, H * 0.42, "#66ffff", 18, 280);
    }

    function updatePlayerTrail(dt) {
      for (const g of playerTrail) g.t -= dt;
      for (let i = playerTrail.length - 1; i >= 0; i--) {
        if (playerTrail[i].t <= 0) playerTrail.splice(i, 1);
      }
      if (state === STATE_HOOK_PRACTICE) {
        playerTrail.length = 0;
        return;
      }
      const speed = len(player.vx, player.vy);
      player.trailCd = Math.max(0, (player.trailCd || 0) - dt);
      if (speed < PLAYER_TRAIL_SPEED || player.trailCd > 0) return;
      player.trailCd = player.hook ? 0.035 : 0.055;
      playerTrail.push({
        x: player.x,
        y: player.y,
        angle: player.aimAngle || 0,
        gravity: world.gravity,
        t: 0.22,
        max: 0.22
      });
      if (playerTrail.length > 8) playerTrail.splice(0, playerTrail.length - 8);
    }

    function tryHook() {
      const target = screenToWorld(mouse.x, mouse.y);
      const hookAnchors = state === STATE_TUTORIAL ? tutorialAnchors : (state === STATE_HOOK_PRACTICE ? practiceAnchors : anchors);
      let best = null;
      let bestD = 900;
      for (const a of hookAnchors) {
        const d = len(a.x - player.x, a.y - player.y);
        const aim = len(a.x - target.x, a.y - target.y);
        if (d < 900 && aim < 170 && aim < bestD) { best = a; bestD = aim; }
      }
      if (best) {
        const wasGrounded = player.onGround;
        if (wasGrounded) player.y -= 14;
        const d = len(best.x - player.x, best.y - player.y) || 1;
        const initialLen = Math.max(70, wasGrounded ? d - 28 : d);
        const startAngle = Math.atan2(player.y - best.y, player.x - best.x);
        player.hook = {
          x: best.x,
          y: best.y,
          len: initialLen,
          tension: 0,
          groundLift: wasGrounded ? 0.32 : 0,
          powerSwing: false,
          powerT: 0,
          lastAngle: startAngle,
          swingArc: 0,
          swingPeak: 0,
          lastTangentX: player.facing || 1,
          lastTangentY: -0.35
        };
        player.onGround = false;
        if (wasGrounded) player.vy = Math.min(player.vy, -320);
        beep(760, 0.07, "square", 0.055, 1.55);
        burst(W / 2, H / 2, "#fff", 16, 260);
        addShake(5, 0.08);
      }
    }

    function updateHook(dt) {
      const h = player.hook;
      h.ceilingBlockT = Math.max(0, (h.ceilingBlockT || 0) - dt);
      h.ceilingNoPullT = Math.max(0, (h.ceilingNoPullT || 0) - dt);
      h.restoreDelayT = Math.max(0, (h.restoreDelayT || 0) - dt);
      const dx = h.x - player.x;
      const dy = h.y - player.y;
      const d = len(dx, dy) || 1;
      const nx = dx / d, ny = dy / d;
      recordHookSwing(h, dt, d);
      const reelSpeed = 760;
      const minLen = 70;
      const maxLen = 900;
      if ((h.groundLift || 0) > 0) {
        h.groundLift = Math.max(0, h.groundLift - dt);
        if (player.onGround) {
          player.y -= 8;
          player.onGround = false;
          player.vy = Math.min(player.vy, -220);
          h.len = Math.max(70, len(h.x - player.x, h.y - player.y));
        }
        h.len = Math.min(h.len, Math.max(70, len(h.x - player.x, h.y - player.y)));
      }
      if (h.powerSwing) {
        updateHookPowerSwing(dt, nx, ny, d);
        return;
      }
      const ceilingBlocked = (h.ceilingNoPullT || 0) > 0 && ny < -0.12;
      if (ceilingBlocked) {
        h.len = Math.max(h.len, d);
        player.vy = Math.max(player.vy, 0);
      }
      if (!ceilingBlocked && h.restoreLen !== undefined && h.restoreDelayT <= 0) {
        const targetLen = Math.max(minLen, Math.min(h.restoreLen, d));
        h.len = Math.max(targetLen, h.len - 520 * dt);
        if (Math.abs(h.len - targetLen) < 2) {
          h.len = targetLen;
          if (targetLen >= h.restoreLen - 1 || h.len <= d + 1) h.restoreLen = undefined;
        }
      }
      if (keys.has("KeyW") && !ceilingBlocked) {
        h.len = Math.max(minLen, h.len - reelSpeed * dt);
        player.vx += nx * 1800 * dt;
        player.vy += ny * 1800 * dt;
      }
      if (keys.has("KeyS")) {
        h.len = Math.min(maxLen, h.len + reelSpeed * dt);
        player.vx -= nx * 900 * dt;
        player.vy -= ny * 900 * dt;
      }
      const lateralInput = (keys.has("KeyD") ? 1 : 0) - (keys.has("KeyA") ? 1 : 0);
      if (lateralInput) {
        let tx = -ny;
        let ty = nx;
        if (tx * lateralInput < 0) {
          tx = -tx;
          ty = -ty;
        }
        const tangentSpeed = player.vx * tx + player.vy * ty;
        const swingAccel = tangentSpeed * lateralInput > 900 ? 2600 : 5200;
        player.vx += tx * swingAccel * dt;
        player.vy += ty * swingAccel * dt;
      }
      if (d > h.len && (h.ceilingBlockT || 0) <= 0) {
        const dot = player.vx * nx + player.vy * ny;
        if (ceilingBlocked) {
          if (dot > 0) {
            player.vx -= dot * nx;
            player.vy -= dot * ny;
          }
          player.vy = Math.max(player.vy, 0);
          h.len = d;
        } else {
          player.vx -= dot * nx;
          player.vy -= dot * ny;
          player.x = h.x - nx * h.len;
          player.y = h.y - ny * h.len;
        }
      }
    }

    function recordHookSwing(h, dt, d) {
      const angle = Math.atan2(player.y - h.y, player.x - h.x);
      if (h.lastAngle === undefined) h.lastAngle = angle;
      let delta = angle - h.lastAngle;
      while (delta > Math.PI) delta -= Math.PI * 2;
      while (delta < -Math.PI) delta += Math.PI * 2;
      h.lastAngle = angle;
      h.swingArc = Math.min(Math.PI * 2.4, (h.swingArc || 0) + Math.abs(delta));

      const ropeOut = norm(player.x - h.x, player.y - h.y);
      let tx = -ropeOut.y;
      let ty = ropeOut.x;
      const signedTangentSpeed = player.vx * tx + player.vy * ty;
      if (signedTangentSpeed < 0) {
        tx = -tx;
        ty = -ty;
      }
      const tangentSpeed = Math.abs(signedTangentSpeed);
      h.swingPeak = Math.max((h.swingPeak || 0) * Math.pow(0.985, dt * 60), tangentSpeed);
      if (tangentSpeed > 120 || Math.abs(delta) / Math.max(dt, 0.001) > 0.55) {
        h.lastTangentX = tx;
        h.lastTangentY = ty;
      }
    }

    function releaseHook() {
      const currentSpeed = len(player.vx, player.vy);
      if (currentSpeed > 80) {
        const boost = Math.min(1.08, 1 + currentSpeed / 18000);
        player.vx *= boost;
        player.vy *= boost;
        const maxReleaseSpeed = 1750;
        const boostedSpeed = len(player.vx, player.vy);
        if (boostedSpeed > maxReleaseSpeed) {
          const cap = maxReleaseSpeed / boostedSpeed;
          player.vx *= cap;
          player.vy *= cap;
        }
      }
      player.hook = null;
    }

    function detachHook() {
      player.hook = null;
      beep(360, 0.05, "triangle", 0.025, 1.2);
    }

    function hookHop() {
      const h = player.hook;
      if (!h) return;
      const toward = norm(h.x - player.x, h.y - player.y);
      player.vx = player.vx * 0.55 + toward.x * 520;
      player.vy = -1650 + Math.min(0, toward.y) * 260;
      player.hook = null;
      player.invuln = Math.max(player.invuln, 0.08);
      beep(700, 0.09, "triangle", 0.05, 1.6);
      burst(W / 2, H / 2, "#fff", 18, 340);
      addShake(8, 0.14);
    }

    function startHookPowerSwing() {
      const h = player.hook;
      if (!h) return;
      const dx = h.x - player.x;
      const dy = h.y - player.y;
      const d = len(dx, dy) || 1;
      const nx = dx / d;
      const ny = dy / d;
      h.powerSwing = true;
      h.powerT = 0;
      h.lockLen = 8;
      h.len = h.lockLen;
      player.x = h.x - nx * h.lockLen;
      player.y = h.y - ny * h.lockLen;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
      player.invuln = Math.max(player.invuln, 0.08);
      beep(680, 0.08, "triangle", 0.05, 1.7);
      burst(W / 2, H / 2, "#fff", 24, 360);
      addShake(11, 0.16);
    }

    function updateHookPowerSwing(dt, nx, ny, d) {
      const h = player.hook;
      h.powerT = Math.min(1.1, (h.powerT || 0) + dt);
      h.len = h.lockLen || 56;
      player.x = h.x - nx * h.len;
      player.y = h.y - ny * h.len;
      player.vx = 0;
      player.vy = 0;
      player.onGround = false;
    }

    function releaseHookPowerSwing() {
      const h = player.hook;
      if (!h?.powerSwing) return;
      const aimPoint = screenToWorld(mouse.x, mouse.y);
      const aim = norm(aimPoint.x - (player.x + player.w / 2), aimPoint.y - (player.y + player.h / 2));
      const charge = clamp((h.powerT || 0) / 0.55, 0.35, 1);
      const speed = 1750 + charge * 650;
      player.vx = aim.x * speed;
      player.vy = aim.y * speed;
      player.hook = null;
      player.hookLaunchT = 0.32;
      player.invuln = Math.max(player.invuln, 0.14);
      beep(560, 0.12, "sawtooth", 0.06, 0.65);
      burst(W / 2, H / 2, "#fff", 24, 420);
      addShake(12, 0.2);
    }

    function hookBurstCancel() {
      const h = player.hook;
      if (h?.powerSwing) {
        releaseHookPowerSwing();
        return;
      }
      const rope = norm(player.x - h.x, player.y - h.y);
      const radialSpeed = player.vx * rope.x + player.vy * rope.y;
      let tx = player.vx - rope.x * radialSpeed;
      let ty = player.vy - rope.y * radialSpeed;
      const currentTangentSpeed = len(tx, ty);
      const arcFactor = clamp((h.swingArc || 0) / Math.PI, 0, 2.4);
      const peakFactor = clamp((h.swingPeak || 0) / 2200, 0, 1.5);
      if (currentTangentSpeed < 420) {
        const remembered = norm(h.lastTangentX || (player.facing || 1), h.lastTangentY || 0);
        const fallback = norm(remembered.x, remembered.y);
        const launchSpeed = clamp(720 + arcFactor * 120 + peakFactor * 260, 760, 1250);
        player.vx = fallback.x * launchSpeed;
        player.vy = Math.max(0, fallback.y * launchSpeed);
        player.invuln = Math.max(player.invuln, 0.12);
        player.hook = null;
        player.hookLaunchT = 0.32;
        beep(520, 0.09, "sawtooth", 0.045, 0.75);
        burst(W / 2, H / 2, "#fff", 16, 280);
        addShake(8, 0.14);
        return;
      }
      const tangent = norm(tx, ty);
      const launchSpeed = clamp(
        820 + currentTangentSpeed * 0.48 + (h.swingPeak || 0) * 0.12 + arcFactor * 110,
        950,
        HOOK_RMB_MAX_SPEED
      );
      player.vx = tangent.x * launchSpeed;
      player.vy = clamp(Math.max(0, tangent.y * launchSpeed), 0, 1050);
      const finalSpeed = len(player.vx, player.vy);
      if (finalSpeed > HOOK_RMB_MAX_SPEED) {
        const cap = HOOK_RMB_MAX_SPEED / finalSpeed;
        player.vx *= cap;
        player.vy *= cap;
      }
      player.invuln = Math.max(player.invuln, 0.12);
      player.hook = null;
      player.hookLaunchT = 0.32;
      beep(520, 0.1, "sawtooth", 0.05, 0.7);
      burst(W / 2, H / 2, "#fff", 18, 300);
      addShake(10, 0.16);
    }

    function update3DBypass(dt) {
      if (transition && transition.mode === "to3d") {
        transition.t += dt;
        if (transition.t >= transition.dur) transition.mode = "play3d";
        return;
      }
      if (transition && transition.mode === "to2d") {
        transition.t += dt;
        if (transition.t >= transition.dur) {
          const g = transition.gate;
          if (g) { g.locked = false; g.cleared = true; }
          player.x = transition.returnX;
          player.y = transition.returnY;
          player.vx = 1050;
          player.vy = 0;
          player.invuln = Math.max(player.invuln, 1);
          world.gravity = 4500;
          state = transition.returnState || STATE_GAME_2D;
          release3DPointerLock();
          if (!transition.gate && room?.tutorial) trainingPortal.completed = true;
          transition = null;
          room = null;
          beep(440, 0.14, "triangle", 0.07, 0.55);
        }
        return;
      }
      update3DMovement(dt);
      updateRoom(dt);
    }

    function update3DMovement(dt) {
      const view = current3DViewport();
      mouse.x = view.x + view.w / 2;
      mouse.y = view.y + view.h / 2;
      camera3D.yaw += pointer.dx * 0.0032;
      camera3D.pitch = clamp(camera3D.pitch + pointer.dy * 0.0016, -0.65, 0.42);
      if (keys.has("KeyQ")) camera3D.yaw -= dt * 2.8;
      if (keys.has("KeyE")) camera3D.yaw += dt * 2.8;
      if (keys.has("KeyC") && !player.turnHeld) {
        camera3D.yaw += Math.PI;
        player.turnHeld = true;
        beep(260, 0.08, "square", 0.04, 1.8);
      }
      if (!keys.has("KeyC")) player.turnHeld = false;
      const forward = { x: Math.sin(camera3D.yaw), z: -Math.cos(camera3D.yaw) };
      const right = { x: Math.cos(camera3D.yaw), z: Math.sin(camera3D.yaw) };
      let ax = 0, az = 0;
      if (player.stun3D <= 0) {
        if (keys.has("KeyW")) { ax += forward.x; az += forward.z; }
        if (keys.has("KeyS")) { ax -= forward.x; az -= forward.z; }
        if (keys.has("KeyA")) { ax -= right.x; az -= right.z; }
        if (keys.has("KeyD")) { ax += right.x; az += right.z; }
      }
      const n = norm(ax, az);
      if (ax || az) {
        player.vx3 += n.x * 94 * dt;
        player.vz3 += n.y * 94 * dt;
      } else {
        player.vx3 *= Math.pow(0.78, dt * 60);
        player.vz3 *= Math.pow(0.78, dt * 60);
      }
      const max = player.dashT > 0 ? 145 : 47;
      const l = len(player.vx3, player.vz3);
      if (l > max) {
        player.vx3 = player.vx3 / l * max;
        player.vz3 = player.vz3 / l * max;
      }
      if (keys.has("KeyF") && player.dashCd <= 0) {
        player.dashT = 0.12;
        player.dashCd = 1.2;
        player.invuln = 0.15;
        player.vx3 = forward.x * 145;
        player.vz3 = forward.z * 145;
        camera3D.fovTarget = 100;
        beep(180, 0.1, "sawtooth", 0.06, 2.2);
        addShake(7, 0.12);
        if (room?.tutorial && room.tutorialStep === 2) completeTrainingStep();
      }
      if (player.dashT <= 0) camera3D.fovTarget = 75;
      updateChargedSlashHold(dt);
      if (mouse.justDown && player.slashCd <= 0 && !canChargeRangedSlash()) slash3D();
      if (mouse.justRight && player.parryCd <= 0) {
        player.parryT = player.bossPrototype ? 0.2 : 0.13;
        player.parryFxT = 0.28;
        player.parryPending = true;
        player.parryHits = 0;
        player.parryCd = 0.5;
        beep(760, 0.08, "square", 0.04, 0.85);
      }
      const roomHalf = isBossState() ? 123 : 14;
      const minZ = isBossState() ? (boss?.defeated ? -246 : -232) : -38;
      player.px = clamp(player.px + player.vx3 * dt, -roomHalf, roomHalf);
      player.pz = clamp(player.pz + player.vz3 * dt, minZ, 15);
    }

    function current3DViewport() {
      return { x: 0, y: 0, w: W, h: H };
    }

    function canChargeRangedSlash() {
      return player.bossPrototype && isBossState() && (player.swordEnergy || 0) > 0;
    }

    function updateChargedSlashHold(dt) {
      if (!canChargeRangedSlash() || player.slashCd > 0) {
        player.chargedSlashHold = 0;
        player.chargedSlashFired = false;
        return;
      }
      if (!mouse.down) {
        player.chargedSlashHold = 0;
        player.chargedSlashFired = false;
        return;
      }
      player.chargedSlashHold = Math.min(1.5, (player.chargedSlashHold || 0) + dt);
      if (!player.chargedSlashFired && player.chargedSlashHold >= 1.5) fireChargedRangedSlash();
    }

    function fireChargedRangedSlash() {
      player.chargedSlashFired = true;
      player.chargedSlashHold = 0;
      player.swordEnergy = Math.max(0, (player.swordEnergy || 0) - 1);
      player.slashT = 0.35;
      player.slashCd = 0.65;
      const forward = { x: Math.sin(camera3D.yaw), z: -Math.cos(camera3D.yaw) };
      chargedSlashFx.push({ t: 0.46, max: 0.46, yaw: camera3D.yaw, x: player.px, z: player.pz, range: CHARGED_SLASH_RANGE });
      const hit = hitChargedSlashTargets(forward);
      beep(1500, 0.16, "sawtooth", 0.08, 0.55);
      noiseBurst(0.08, 0.08);
      burst(W / 2, H * 0.48, hit ? "#ffffff" : "#66ffff", 54, 620);
      addShake(hit ? 24 : 14, 0.24);
    }

    function hitChargedSlashTargets(forward) {
      const maxRange = CHARGED_SLASH_RANGE;
      const width = 5.2;
      const hits = [];
      if (boss && (state === STATE_BOSS_P1 || state === STATE_BOSS_P3)) {
        const bossBlocker = slashRayHit(boss.x, boss.z, forward, maxRange, boss.shielded ? 12.5 : 7.2);
        if (bossBlocker) hits.push({ kind: "boss", along: bossBlocker.along });
        for (const t of boss.towers || []) {
          const ray = t.alive ? slashRayHit(t.x, t.z, forward, maxRange, width) : null;
          if (ray) hits.push({ kind: "tower", target: t, along: ray.along });
        }
      }
      if (room) {
        for (const e of room.enemies) {
          const ray = e.alive ? slashRayHit(e.x, e.z, forward, maxRange, width) : null;
          if (ray) hits.push({ kind: "enemy", target: e, along: ray.along });
        }
      }
      hits.sort((a, b) => a.along - b.along);
      const first = hits[0];
      if (!first) return false;
      if (first.kind === "tower") {
        first.target.hp = 0;
        breakBossTower(first.target);
      } else if (first.kind === "boss") {
        damageBossCore(6);
      } else if (first.kind === "enemy") {
        const e = first.target;
        e.hitT = 0.28;
        e.hp = 0;
        e.alive = false;
        maybeDropHealthPickup(e.x, e.z);
      }
      return true;
    }

    function slashRayHit(x, z, forward, maxRange, width) {
      const dx = x - player.px;
      const dz = z - player.pz;
      const along = dx * forward.x + dz * forward.z;
      if (along < 0 || along > maxRange) return null;
      const lateral = Math.abs(dx * forward.z - dz * forward.x);
      return lateral <= width ? { along, lateral } : null;
    }

    function slash3D() {
      player.slashT = 0.2;
      player.slashCd = 0.35;
      beep(540, 0.08, "sawtooth", 0.045, 1.8);
      burst(W / 2, H / 2, "#fff", 16, 240);
      addShake(4, 0.08);
      const forward = { x: Math.sin(camera3D.yaw), z: -Math.cos(camera3D.yaw) };
      if (room) {
        const target = getSlashTarget(room);
        if (target) hit3DEnemy(target.e);
      }
      if (boss && (state === STATE_BOSS_P3 || state === STATE_BOSS_P1)) {
        for (const m of boss.mines) {
          if (m.alive && len(m.x - player.px, m.z - player.pz) < 6) {
            m.vx = forward.x * 38;
            m.vz = forward.z * 38;
            m.launchedByPlayer = true;
            m.hostile = false;
            m.warn = 0;
            m.target = null;
            m.life = 4.0;
            m.armed = false;
            beep(860, 0.08, "triangle", 0.06, 1.35);
            addShake(6, 0.1);
          }
        }
      }
    }

    function hit3DEnemy(e) {
      e.hitT = 0.18;
      if (e.guardT > 0) {
        beep(360, 0.08, "square", 0.05, 0.6);
        burst(W / 2, H / 2, "#66ffff", 14, 260);
        return;
      }
      if (room?.tutorial) {
        e.hitT = 0.22;
        e.stun = 0.35;
        beep(780, 0.09, "triangle", 0.06, 1.5);
        burst(W / 2, H / 2, "#66ffff", 24, 380);
        if (room.tutorialStep === 0) completeTrainingStep();
        return;
      }
      if (e.type === "drone") {
        e.hitT = 0.22;
        beep(240, 0.08, "square", 0.045, 0.7);
        burst(W / 2, H / 2, "#66ffff", 16, 260);
        e.guardT = 0.5;
        return;
      }
      if (e.type === "shield" && e.armor) {
        e.hitT = 0.28;
        e.armor = false;
        e.stun = 0.55;
        beep(260, 0.11, "square", 0.075, 0.45);
        noiseBurst(0.12, 0.06);
        burst(W / 2, H / 2, "#fff", 28, 420);
        return;
      }
      e.hp -= 1;
      e.hitT = 0.24;
      e.stun = 0.18;
      burst(W / 2, H / 2, "#fff", 16, 320);
      if (e.hp <= 0) {
        if (e.type === "drone") spawnMiniDrones(e);
        e.alive = false;
        maybeDropHealthPickup(e.x, e.z);
        beep(920, 0.13, "triangle", 0.07, 0.35);
        noiseBurst(0.08, 0.05);
        burst(W / 2, H / 2, "#fff", 36, 520);
        addShake(7, 0.13);
      }
    }

    function maybeDropHealthPickup(x, z) {
      if (!room || room.tutorial) return;
      if (Math.random() >= 0.10) return;
      room.healthPickups = room.healthPickups || [];
      room.healthPickups.push({ kind: "heal", x, y: 1.15, z, alive: true, t: 12 });
      beep(660, 0.08, "triangle", 0.045, 1.25);
    }

    function maybeDropBossHealthPickup(x, z) {
      if (!boss || boss.defeated) return;
      if (Math.random() >= 0.10) return;
      boss.healthPickups = boss.healthPickups || [];
      boss.healthPickups.push({ kind: "heal", x, y: 1.25, z, alive: true, t: 14 });
      beep(660, 0.08, "triangle", 0.045, 1.25);
      burst(W / 2, H * 0.42, "#66ff99", 22, 320);
    }

    function updateHealthPickups(roomData, dt) {
      if (!roomData?.healthPickups) return;
      for (const h of roomData.healthPickups) {
        if (!h.alive) continue;
        h.t -= dt;
        h.y = 1.15 + Math.sin(gameTime * 5 + h.x) * 0.12;
        if (len(player.px - h.x, player.pz - h.z) < 1.55) {
          const before = player.hp;
          player.hp = Math.min(player.maxHp, player.hp + 1);
          h.alive = false;
          if (player.hp > before) {
            beep(920, 0.12, "triangle", 0.07, 1.55);
            burst(W / 2, H * 0.46, "#66ff99", 26, 360);
            addShake(5, 0.1);
          }
        }
      }
      for (let i = roomData.healthPickups.length - 1; i >= 0; i--) {
        if (!roomData.healthPickups[i].alive || roomData.healthPickups[i].t <= 0) roomData.healthPickups.splice(i, 1);
      }
    }

    function spawnMiniDrones(parent) {
      if (!room) return;
      const spreads = [-4.2, 0, 4.2];
      for (let i = 0; i < 3; i++) {
        const a = -Math.PI / 2 + i * Math.PI / 2;
        room.enemies.push({
          type: "miniDrone",
          x: clamp(parent.x + spreads[i], -13.5, 13.5),
          z: parent.z + Math.sin(a) * 2.4,
          y: -1.2,
          hp: 1,
          armor: false,
          alive: true,
          stun: 0.12,
          shot: 99,
          lunge: 0,
          vx: spreads[i] * 1.2,
          vz: Math.sin(a) * 3
        });
      }
      burst(W / 2, H / 2, "#66ffff", 28, 440);
      addShake(10, 0.14);
    }

    function completeTrainingStep() {
      if (!room?.tutorial) return;
      room.tutorialStep += 1;
      parrySuccessT = 0.35;
      burst(W / 2, H * 0.42, "#66ffff", 26, 420);
      beep(980, 0.12, "triangle", 0.07, 1.4);
      if (room.tutorialStep >= 3) {
        room.gateOpen = true;
        room.cleared = true;
        queueTutorialText("trainEnemyRules", msg("trainEnemyRules"), 3.0) || queueTutorialText("trainDone", msg("trainDone"), 2.0);
      } else {
        const next = [msg("trainSlash"), msg("trainParry"), msg("trainDash")][room.tutorialStep];
        const id = ["trainSlash", "trainParry", "trainDash"][room.tutorialStep];
        queueTutorialText(id, next, 1.8);
      }
    }

    function updateRoom(dt) {
      room.fog += dt * (0.12 + room.index * 0.04);
      if (room.tutorial) {
        room.skipHold = keys.has("KeyR") ? Math.min(3, (room.skipHold || 0) + dt) : 0;
        if (room.skipHold >= 3) {
          room.skipHold = 0;
          room.cleared = true;
          room.gateOpen = true;
          trainingPortal.completed = true;
          beep(760, 0.16, "triangle", 0.075, 1.4);
          burst(W / 2, H * 0.55, "#66ffff", 36, 340);
          addShake(8, 0.18);
          exit3D();
          return;
        }
      }
      for (const e of room.enemies) {
        if (!e.alive) continue;
        e.guardT = Math.max(0, (e.guardT || 0) - dt);
        e.hitT = Math.max(0, (e.hitT || 0) - dt);
        if (e.knockT > 0) {
          e.knockT -= dt;
          e.x += (e.vx || 0) * dt;
          e.z += (e.vz || 0) * dt;
          e.y = e.baseY + Math.sin((1 - e.knockT / 0.55) * Math.PI) * 0.75;
          e.vx *= Math.pow(0.82, dt * 60);
          e.vz *= Math.pow(0.82, dt * 60);
          continue;
        } else if (e.baseY !== undefined) {
          e.y = e.baseY;
        }
        e.stun = Math.max(0, e.stun - dt);
        e.lunge = Math.max(0, (e.lunge || 0) - dt);
        const distToPlayer = len(player.px - e.x, player.pz - e.z);
        if (e.type === "drone") e.y = -4.2 + Math.sin(gameTime * 4 + e.x) * 0.8;
        if (e.type === "miniDrone") e.y = -1.2 + Math.sin(gameTime * 7 + e.x) * 0.35;
        if (room.tutorial) {
          e.shot -= dt;
          if (room.tutorialStep >= 1 && e.shot <= 0) {
            e.shot = 1.25;
            room.bullets.push(makeBullet(e.x, e.z, player.px, player.pz, false));
          }
          continue;
        }
        if (e.stun <= 0) {
          const n = norm(player.px - e.x, player.pz - e.z);
          let spd = e.type === "brute" ? 4.7 : (e.type === "drone" ? 5.7 : (e.type === "miniDrone" ? 10.8 : (e.type === "chain" ? 11.5 : (e.type === "shield" ? 5.5 : 7.1))));
          if (e.type === "chain" && e.chainWindup > 0) {
            e.chainWindup -= dt;
            if (e.chainWindup <= 0) {
              const target = e.chainTarget || { x: player.px, z: player.pz };
              room.chainStrikes.push({ x: e.x, z: e.z, tx: target.x, tz: target.z, t: 0.34, max: 0.34, hit: false, swing: 1 });
              e.chainTarget = null;
              e.shot = 0.9;
              beep(180, 0.12, "sawtooth", 0.055, 0.65);
              addShake(6, 0.11);
            }
            continue;
          }
          if (e.type === "cube" && distToPlayer < 6 && e.lunge <= 0) {
            e.lunge = 1.05;
            e.vx = n.x * 18;
            e.vz = n.y * 18;
            beep(220, 0.04, "square", 0.025, 1.4);
          }
          if (e.lunge > 0 && e.type === "cube") {
            e.x += (e.vx || 0) * dt;
            e.z += (e.vz || 0) * dt;
            e.vx *= Math.pow(0.90, dt * 60);
            e.vz *= Math.pow(0.90, dt * 60);
          } else if (e.type === "drone") {
            if (distToPlayer < 11) {
              e.x -= n.x * spd * 0.75 * dt;
              e.z -= n.y * spd * 0.75 * dt;
            } else if (distToPlayer > 17) {
              e.x += n.x * spd * 0.55 * dt;
              e.z += n.y * spd * 0.55 * dt;
            }
          } else if (e.type !== "chain") {
            e.x += n.x * spd * dt;
            e.z += n.y * spd * dt;
          } else if (distToPlayer > 8.0) {
            e.x += n.x * spd * dt;
            e.z += n.y * spd * dt;
          }
          e.shot -= dt;
          if (e.type === "brute" && e.shot <= 0) {
            e.shot = 1.65;
            const ownedShots = room.bullets.filter(b => !b.dead && b.owner === e.id).length;
            if (ownedShots < 3) room.bullets.push(makeBullet(e.x, e.z, player.px, player.pz, true, e.id));
          } else if (e.type === "chain" && distToPlayer < 9.2 && e.shot <= 0) {
            e.chainWindup = 0.46;
            e.chainTarget = { x: player.px, z: player.pz };
            beep(520, 0.08, "square", 0.05, 0.45);
          } else if (e.type === "drone" && distToPlayer < 22 && e.shot <= 0) {
            e.shot = 1.15;
            const b = makeBeam(e.x, e.z, player.px, player.pz);
            room.bullets.push(b);
          }
        }
        if (len(e.x - player.px, e.z - player.pz) < 1.4) {
          const n = norm(e.x - player.px, e.z - player.pz);
          if (!room.tutorial) damage(e.type === "brute" ? 2 : 1);
          e.baseY = e.baseY ?? e.y;
          e.vx = n.x * 14;
          e.vz = n.y * 14;
          e.knockT = 0.55;
          e.stun = 0.9;
        }
      }
      updateChainStrikes(room, dt);
      updateEnemySlashWindows(room, dt);
      separateEnemies(room.enemies, dt);
      updateBullets(room.bullets, dt, b => {
        if (b.reflected) {
          for (const e of room.enemies) {
            if (e.alive && len(e.x - b.x, e.z - b.z) < 1.2) {
              b.dead = true;
              e.hitT = 0.24;
              if (e.type === "drone") {
                e.hp = Math.max(0, (e.hp || 1) - 1);
                e.stun = 0.55;
                beep(760, 0.08, "triangle", 0.055, 1.35);
                burst(W / 2, H / 2, "#66ffff", 20, 360);
                addShake(7, 0.12);
                if (e.hp <= 0) {
                  spawnMiniDrones(e);
                  e.alive = false;
                  maybeDropHealthPickup(e.x, e.z);
                  beep(920, 0.13, "triangle", 0.07, 0.35);
                  burst(W / 2, H / 2, "#66ffff", 30, 460);
                  addShake(10, 0.16);
                }
              } else if (e.type === "shield" && e.armor) {
                e.hitT = 0.28;
                e.armor = false;
                e.stun = 0.65;
                e.guardT = 0;
                beep(360, 0.12, "sawtooth", 0.06, 1.9);
                burst(W / 2, H / 2, "#fff", 24, 380);
                addShake(9, 0.16);
              } else {
                e.hitT = 0.24;
                e.hp = Math.max(0, (e.hp || 1) - 1);
                e.stun = 0.45;
                beep(720, 0.09, "triangle", 0.055, 1.35);
                burst(W / 2, H / 2, "#ffffff", 18, 320);
                addShake(7, 0.12);
                if (e.hp <= 0) {
                  e.alive = false;
                  maybeDropHealthPickup(e.x, e.z);
                }
              }
            }
          }
        }
      });
      updateHealthPickups(room, dt);
      if (room.firewall.active) {
        room.firewall.z += 12 * dt;
        if (Math.abs(room.firewall.z - player.pz) < 0.6 && Math.abs(player.px - room.firewall.holeX) > 1.7) damage(10);
      }
      if (!room.tutorial) {
        room.cleared = room.enemies.every(e => !e.alive);
        room.gateOpen = room.cleared;
      }
      if (room.gateOpen && len(player.px - room.returnGate.x, player.pz - room.returnGate.z) < 2.4) exit3D();
    }

    function updateChainStrikes(roomData, dt) {
      if (!roomData.chainStrikes) roomData.chainStrikes = [];
      for (const s of roomData.chainStrikes) {
        s.t -= dt;
        const progress = 1 - s.t / s.max;
        if (!s.hit && progress > 0.34) {
          const dx = s.tx - s.x;
          const dz = s.tz - s.z;
          const l2 = Math.max(0.001, dx * dx + dz * dz);
          const px = player.px - s.x;
          const pz = player.pz - s.z;
          const u = clamp((px * dx + pz * dz) / l2, 0, 1);
          const cx = s.x + dx * u;
          const cz = s.z + dz * u;
          if (len(player.px - cx, player.pz - cz) < 1.4) {
            damage(1);
            player.stun3D = Math.max(player.stun3D || 0, 0.75);
            s.hit = true;
            addShake(9, 0.14);
          }
        }
      }
      for (let i = roomData.chainStrikes.length - 1; i >= 0; i--) {
        if (roomData.chainStrikes[i].t <= 0) roomData.chainStrikes.splice(i, 1);
      }
    }

    function updateEnemySlashWindows(roomData, dt) {
      if (roomData.tutorial) return;
      const target = getSlashTarget(roomData, true);
      for (const e of roomData.enemies) {
        if (!e.alive) continue;
        if (target?.e === e && !(e.guardT > 0)) {
          e.slashWindow = (e.slashWindow || 0) + dt;
          if (e.slashWindow > 0.5) {
            e.guardT = 0.95;
            e.slashWindow = 0;
            beep(480, 0.08, "triangle", 0.04, 1.8);
          }
        } else {
          e.slashWindow = Math.max(0, (e.slashWindow || 0) - dt * 2);
        }
      }
    }

    function separateEnemies(enemies, dt) {
      for (let i = 0; i < enemies.length; i++) {
        const a = enemies[i];
        if (!a.alive) continue;
        for (let j = i + 1; j < enemies.length; j++) {
          const b = enemies[j];
          if (!b.alive) continue;
          const dx = b.x - a.x;
          const dz = b.z - a.z;
          const d = len(dx, dz) || 0.001;
          const minD = (a.type === "drone" || b.type === "drone") ? 4.2 : ((a.type === "miniDrone" || b.type === "miniDrone") ? 2.9 : 2.65);
          if (d < minD) {
            const push = (minD - d) * 0.65;
            const nx = dx / d;
            const nz = dz / d;
            a.x -= nx * push;
            a.z -= nz * push;
            b.x += nx * push;
            b.z += nz * push;
          }
        }
      }
    }

    function makeBullet(x, z, tx, tz, homing, owner = "") {
      const n = norm(tx - x, tz - z);
      return { x, z, vx: n.x * 17, vz: n.y * 17, r: 0.32, homing, owner, age: 0, life: homing ? (isBossState() ? 8 : 5) : 0, reflected: false, dead: false };
    }

    function makeBeam(x, z, tx, tz, style = "dart") {
      const n = norm(tx - x, tz - z);
      beep(1320, 0.045, "square", 0.035, 0.72);
      return { x, z, vx: n.x * 32, vz: n.y * 32, r: isBossState() ? 0.36 : 0.24, homing: false, beam: true, beamStyle: style, reflected: false, dead: false };
    }

    function updateBullets(bullets, dt, onHit) {
      for (const b of bullets) {
        if (b.dead) continue;
        b.age = (b.age || 0) + dt;
        if (b.life && !b.reflected && b.age > b.life) {
          b.dead = true;
          continue;
        }
        if (b.homing && !b.reflected) {
          const n = norm(player.px - b.x, player.pz - b.z);
          const speed = b.tower ? 18 : 22;
          b.vx = lerp(b.vx, n.x * speed, dt * 1.7);
          b.vz = lerp(b.vz, n.y * speed, dt * 1.7);
        }
        const parryRadius = player.bossPrototype ? 5.2 : 3.6;
        if (player.parryT > 0 && !b.reflected && len(player.px - b.x, player.pz - b.z) < parryRadius) {
          const forward = { x: Math.sin(camera3D.yaw), z: -Math.cos(camera3D.yaw) };
          const speed = Math.max(38, len(b.vx, b.vz) * 2.25);
          b.vx = forward.x * speed;
          b.vz = forward.z * speed;
          b.reflected = true;
          b.homing = false;
          b.owner = "";
          player.parryHits = 1;
          player.parryT = 0;
          player.parryFxT = Math.max(player.parryFxT || 0, 0.22);
          player.parryPending = false;
          bossFlash = 0.08;
          parrySuccessT = 0.45;
          registerParrySuccessCharge();
          beep(1960, 0.045, "square", 0.095, 0.62);
          beep(760, 0.07, "triangle", 0.06, 2.4);
          noiseBurst(0.035, 0.065);
          burst(W / 2, H * 0.42, "#ffffff", 34, 460);
          addShake(14, 0.16);
          if (room?.tutorial && room.tutorialStep === 1) completeTrainingStep();
        }
        b.x += b.vx * dt;
        b.z += b.vz * dt;
        if (bulletHitsPillar(b)) {
          b.dead = true;
          continue;
        }
        if (!b.reflected && len(player.px - b.x, player.pz - b.z) < 1.1) {
          if (!room?.tutorial) damage(1);
          if (b.chain) player.stun3D = Math.max(player.stun3D || 0, 0.7);
          b.dead = true;
        }
        onHit?.(b);
        if (Math.abs(b.x) > 210 || Math.abs(b.z) > 230) b.dead = true;
      }
      for (let i = bullets.length - 1; i >= 0; i--) if (bullets[i].dead) bullets.splice(i, 1);
    }

    function registerParrySuccessCharge() {
      if (!player.bossPrototype) return;
      player.parryChargeCount = (player.parryChargeCount || 0) + 1;
      if (player.parryChargeCount >= 3) {
        player.parryChargeCount = 0;
        player.swordEnergy = Math.min(3, (player.swordEnergy || 0) + 1);
        beep(1320, 0.16, "triangle", 0.08, 1.65);
        burst(W / 2, H * 0.58, "#66ffff", 34, 420);
        addShake(9, 0.14);
      }
    }

    function bulletHitsPillar(b) {
      if (state !== STATE_GAME_3D_BYPASS || !room?.pillars?.length) return false;
      return room.pillars.some(p => len(b.x - p.x, b.z - p.z) < 0.9 + (b.r || 0.25));
    }

    function hasParryOpportunity() {
      if (!is3DPointerState() || player.parryCd > 0 || player.parryT > 0) return false;
      const sources = [];
      if (room?.bullets) sources.push(...room.bullets);
      if (boss?.bullets) sources.push(...boss.bullets);
      const radius = player.bossPrototype ? 6.3 : 4.6;
      return sources.some(b => !b.dead && !b.reflected && len(player.px - b.x, player.pz - b.z) < radius);
    }

    function updateBossP1(dt) {
      if (boss.defeated) {
        updateBossAftermath(dt);
        return;
      }
      boss.introNoticeT = Math.max(0, (boss.introNoticeT || 0) - dt);
      update3DMovement(dt);
      updateBossHelperDrops(dt);
      updateBossTowerPressure(dt);
      updateBossLasers(dt);
      updateBossSkills(dt);
      boss.t += dt;
      if (boss.t > 1.38) {
        boss.t = 0;
        const phase = boss.towerPhase || 1;
        const ringCount = boss.shielded ? (phase >= 3 ? 3 : 5) : (phase >= 2 ? 5 : 7);
        for (let i = 0; i < ringCount; i++) {
          const a = i / ringCount * Math.PI * 2 + gameTime * 0.35;
          boss.bullets.push({ x: boss.x, z: boss.z, vx: Math.cos(a) * (24 + phase * 2), vz: Math.sin(a) * (24 + phase * 2), r: 0.36, beam: true, beamStyle: phase >= 2 ? "needle" : "dart", reflected: false, homing: false, dead: false });
        }
        if (phase === 1 || !boss.shielded) boss.bullets.push(makeBeam(boss.x, boss.z, player.px, player.pz, phase >= 2 ? "needle" : "dart"));
      }
      updateBullets(boss.bullets, dt, b => {
        if (hitBossTowerWithProjectile(b)) return;
        if (b.reflected && len(boss.x - b.x, boss.z - b.z) < 5.0) {
          damageBossCore(2);
          b.dead = true;
        }
      });
    }

    function updateBossSkills(dt) {
      if (!boss || boss.defeated) return;
      boss.skillNoticeT = Math.max(0, (boss.skillNoticeT || 0) - dt);
      boss.skillT -= dt;
      if (boss.skillT > 0) return;
      const alive = boss.towers?.filter(t => t.alive) || [];
      const phase = boss.towerPhase || 1;
      const pools = {
        1: ["towerLance", "gravityPulse", "chaseNeedles"],
        2: ["mirrorCut", "ringSweep", "gravityPulse", "towerLance"],
        3: ["ringSweep", "mirrorCut", "chaseNeedles", "towerLance", "gravityPulse"]
      };
      const pool = pools[Math.min(3, phase)] || pools[1];
      const skill = pool[Math.floor(gameTime * 0.87 + phase * 2.1) % pool.length];
      boss.skillT = boss.shielded ? Math.max(2.0, 3.0 - phase * 0.22) : Math.max(1.55, 2.35 - phase * 0.18);
      if (skill === "towerLance" && alive.length) {
        boss.skillName = bossSkillName("towerLance");
        boss.skillNoticeT = 1.0;
        alive.forEach((t, i) => {
          if (i % 2 === Math.floor(gameTime) % 2 || phase >= 3) {
            const b = makeBullet(t.x, t.z, player.px, player.pz, true);
            b.vx *= 0.92;
            b.vz *= 0.92;
            b.tower = true;
            boss.bullets.push(b);
          }
        });
        addShake(8, 0.12);
      } else if (skill === "gravityPulse") {
        boss.skillName = bossSkillName("gravityPulse");
        boss.skillNoticeT = 1.0;
        const count = 6 + phase * 2;
        for (let i = 0; i < count; i++) {
          const a = i / count * Math.PI * 2 + gameTime;
          boss.bullets.push({ x: boss.x, z: boss.z, vx: Math.cos(a) * (22 + phase * 3), vz: Math.sin(a) * (22 + phase * 3), r: 0.34, beam: true, beamStyle: "pulse", reflected: false, homing: false, dead: false });
        }
        addShake(18, 0.24);
        beep(120, 0.16, "sawtooth", 0.055, 1.8);
      } else if (skill === "mirrorCut") {
        boss.skillName = bossSkillName("mirrorCut");
        boss.skillNoticeT = 1.0;
        const candidates = [
          { x: -42 - phase * 8, z: -54 },
          { x: 42 + phase * 8, z: -54 },
          { x: -64 - phase * 6, z: -116 },
          { x: 64 + phase * 6, z: -116 },
          { x: -32, z: -182 },
          { x: 32, z: -182 },
          { x: 0, z: -214 }
        ];
        let best = candidates[0];
        let bestD = -1;
        for (const c of candidates) {
          const d = len(player.px - c.x, player.pz - c.z);
          if (d > bestD) { best = c; bestD = d; }
        }
        boss.x = best.x;
        boss.z = best.z;
        for (let i = -1 - Math.floor(phase / 2); i <= 1 + Math.floor(phase / 2); i++) {
          const b = makeBeam(boss.x + i * 2.6, boss.z + 2 + Math.abs(i) * 0.6, player.px, player.pz, "mirror");
          b.vx *= 0.85 + phase * 0.06;
          b.vz *= 0.85 + phase * 0.06;
          boss.bullets.push(b);
        }
        bossFlash = 0.22;
        addShake(12, 0.2);
      } else if (skill === "ringSweep") {
        boss.skillName = bossSkillName("ringSweep");
        boss.skillNoticeT = 1.05;
        const count = 10 + phase * 5;
        for (let i = 0; i < count; i++) {
          const a = i / count * Math.PI * 2 + gameTime * (phase >= 3 ? 0.95 : 0.4);
          const b = makeBeam(boss.x + Math.cos(a) * 2, boss.z + Math.sin(a) * 2, boss.x + Math.cos(a) * 40, boss.z + Math.sin(a) * 40, "sweep");
          b.vx *= 0.52 + phase * 0.11;
          b.vz *= 0.52 + phase * 0.11;
          boss.bullets.push(b);
        }
        addShake(16, 0.22);
      } else {
        boss.skillName = bossSkillName("chaseNeedles");
        boss.skillNoticeT = 1.0;
        for (let i = 0; i < 4 + phase * 2; i++) {
          const a = gameTime * 1.7 + i * Math.PI * 2 / (4 + phase * 2);
          const sx = boss.x + Math.cos(a) * (10 + phase * 3);
          const sz = boss.z + Math.sin(a) * (10 + phase * 3);
          const b = makeBullet(sx, sz, player.px, player.pz, true);
          b.vx *= 1.15;
          b.vz *= 1.15;
          boss.bullets.push(b);
        }
        beep(480, 0.08, "square", 0.045, 1.3);
      }
    }

    function bossSkillName(key) {
      const names = {
        towerLance: { en: "TOWER LANCE", ko: "타워 랜스" },
        gravityPulse: { en: "GRAVITY PULSE", ko: "중력 파동" },
        mirrorCut: { en: "MIRROR CUT", ko: "거울 베기" },
        ringSweep: { en: "RING SWEEP", ko: "원형 소거" },
        chaseNeedles: { en: "CHASE NEEDLES", ko: "추적 침탄" },
        chainBind: { en: "TOWER CHAIN BIND", ko: "타워 사슬 구속" },
        allySupply: { en: "ALLY SUPPLY: RECOVERY DATA DROPPED", ko: "조력자 보급: 회복 데이터 투하" },
        shieldReformed: { en: "CORE SHIELD REFORMED", ko: "코어 방어막 재구성" }
      };
      return (names[key]?.[lang]) || names[key]?.en || key;
    }

    function updateBossTowerPressure(dt) {
      if (!boss?.towers?.length || boss.defeated) return;
      for (const t of boss.towers) {
        if (!t.alive) continue;
        t.shot = Math.max(0, (t.shot || 0) - dt);
        t.chainCd = Math.max(0, (t.chainCd || 0) - dt);
        if (t.chainWindup > 0) {
          t.chainWindup -= dt;
          if (t.chainWindup <= 0 && t.chainTarget) {
            boss.chainStrikes = boss.chainStrikes || [];
            boss.chainStrikes.push({
              x: t.x,
              z: t.z,
              tx: t.chainTarget.x,
              tz: t.chainTarget.z,
              t: 0.38,
              max: 0.38,
              hit: false,
              swing: 1,
              tower: true
            });
            t.chainTarget = null;
            beep(300, 0.11, "sawtooth", 0.065, 1.8);
            addShake(8, 0.12);
          }
        }
        const d = len(player.px - t.x, player.pz - t.z);
        const phase = t.phase || 1;
        if (d < 46 + phase * 14 && t.shot <= 0) {
          t.shot = Math.max(0.85, 1.85 - phase * 0.18);
          const b = makeBullet(t.x, t.z, player.px, player.pz, true);
          b.tower = true;
          b.vx *= 0.95 + phase * 0.08;
          b.vz *= 0.95 + phase * 0.08;
          boss.bullets.push(b);
          beep(560, 0.05, "square", 0.035, 1.25);
        }
        if (d < 44 + phase * 10 && t.chainCd <= 0 && t.chainWindup <= 0) {
          t.chainCd = Math.max(2.0, 3.8 - phase * 0.42) + Math.random() * 0.75;
          t.chainWindup = 0.52;
          t.chainTarget = { x: player.px, z: player.pz };
          beep(520, 0.08, "square", 0.055, 0.45);
        }
      }
      updateChainStrikes(boss, dt);
    }

    function updateBossLasers(dt) {
      if (!boss?.lasers) return;
      for (const lz of boss.lasers) {
        lz.t -= dt;
        if (!lz.hit && lz.t < lz.warn) {
          if (Math.abs(player.px - lz.x) < 1.8 && Math.abs(player.pz - lz.z) < 7.5) {
            damage(2);
            lz.hit = true;
            addShake(18, 0.22);
          }
        }
      }
      for (let i = boss.lasers.length - 1; i >= 0; i--) if (boss.lasers[i].t <= 0) boss.lasers.splice(i, 1);
    }

    function updateBossMaze(dt) {
      bossMaze.spikeY += 150 * dt;
      for (const b of bossMaze.breaks) {
        if (!b.open && len(player.x - (b.x + b.w / 2), player.y - (b.y + b.h / 2)) < 190) b.open = true;
      }
      const mazeSolids = [...bossMaze.solids, ...bossMaze.breaks.filter(b => !b.open)];
      const speed = 1400;
      const accel = 3500;
      const left = keys.has("KeyA");
      const right = keys.has("KeyD");
      if (left) { player.vx -= accel * dt; player.facing = -1; }
      if (right) { player.vx += accel * dt; player.facing = 1; }
      if (!left && !right) player.vx *= Math.pow(0.8, dt * 60);
      player.vx = clamp(player.vx, -speed, speed);
      if (keys.has("Space") && !player.jumpHeld) {
        if (player.onGround) {
          player.vy = JUMP_FORCE_2D;
          player.onGround = false;
        } else if (player.wall) {
          player.vx = -player.wall * 900;
          player.vy = WALL_JUMP_Y_2D;
        }
      }
      player.jumpHeld = keys.has("Space");
      player.vy += 4500 * dt;
      move2D(dt, mazeSolids, [], true);
      if (player.y < bossMaze.spikeY + 80) {
        if (devInvincible) restorePlayerToSafe2DSpot(mazeSolids);
        else damage(10);
      }
      if (aabb(playerBox(), bossMaze.portal)) enterBossP3();
    }

    function updateBossP3(dt) {
      if (boss.defeated) {
        updateBossAftermath(dt);
        return;
      }
      if (!boss.shielded && boss.towerPhase === 2 && boss.hp <= 0) {
        boss.towerPhase = 3;
        boss.hp = boss.maxHp;
        boss.shielded = true;
        boss.towers = makeBossTowers(2, 3);
        boss.chainStrikes = [];
        boss.skillT = 1.5;
        boss.skillName = msg("bossShieldHint");
        boss.skillNoticeT = 2.2;
        bossFlash = 0.35;
        triggerPhaseBlackout(0.78);
        addShake(20, 0.32);
      }
      boss.phase3Swap += dt;
      update3DMovement(dt);
      updateBossHelperDrops(dt);
      updateBossTowerPressure(dt);
      updateBossLasers(dt);
      updateBossSkills(dt);
      if (boss.phase3Swap > 1.05) {
        boss.phase3Swap = 0;
        boss.bullets.push(makeBeam(boss.x, boss.z, player.px, player.pz, "needle"));
        if (Math.sin(gameTime * 3) > 0.15) {
          const side = Math.sin(gameTime * 3) > 0 ? 1 : -1;
          boss.bullets.push(makeBeam(boss.x + side * 5, boss.z + 3, player.px, player.pz, "mirror"));
        }
      }
      updateBullets(boss.bullets, dt, b => {
        if (hitBossTowerWithProjectile(b)) return;
        if (b.reflected && len(boss.x - b.x, boss.z - b.z) < 5.0) {
          damageBossCore(2);
          b.dead = true;
        }
      });
      updateBossEntropyOrbs(dt);
    }

    function updateBossEntropyOrbs(dt) {
      if (!boss?.mines?.length) return;
      for (const m of boss.mines) {
        if (!m.alive) continue;
        if (m.launchedByPlayer) {
          m.x += m.vx * dt;
          m.z += m.vz * dt;
          if (len(m.x - boss.x, m.z - boss.z) < 5.8) {
            damageBossCore(3);
            m.alive = false;
            burst(bossFxPoint().x, bossFxPoint().y, "#ffffff", 24, 360);
          }
          if (Math.abs(m.x) > 130 || Math.abs(m.z) > 250) m.alive = false;
          continue;
        }

        if (m.hostile) {
          m.life -= dt;
          m.x += m.vx * dt;
          m.z += m.vz * dt;
          if (len(m.x - player.px, m.z - player.pz) < 1.55) {
            damage(1);
            m.hostile = false;
            m.life = 0;
            m.cooldown = 3.8 + Math.random() * 1.8;
            m.vx = 0;
            m.vz = 0;
            addShake(10, 0.15);
          } else if (m.life <= 0) {
            m.hostile = false;
            m.vx = 0;
            m.vz = 0;
            m.cooldown = 3.4 + Math.random() * 2.0;
          }
          continue;
        }

        if (m.warn > 0) {
          m.warn -= dt;
          updateEntropyOrbitPosition(m, 1.45);
          if (m.warn <= 0 && m.target) {
            const n = norm(m.target.x - m.x, m.target.z - m.z);
            m.vx = n.x * 24;
            m.vz = n.y * 24;
            m.hostile = true;
            m.life = 2.2;
            m.target = null;
            beep(260, 0.1, "sawtooth", 0.06, 1.6);
          }
          continue;
        }

        m.cooldown -= dt;
        updateEntropyOrbitPosition(m, 1);
        if (m.cooldown <= 0 && len(m.x - player.px, m.z - player.pz) < 60) {
          m.warn = 0.75;
          m.target = { x: player.px, z: player.pz };
          m.cooldown = 5.6 + Math.random() * 2.4;
          boss.skillName = lang === "ko" ? "엔트로피 구체 돌진" : "ENTROPY ORB CHARGE";
          boss.skillNoticeT = Math.max(boss.skillNoticeT || 0, 0.8);
          beep(620, 0.08, "square", 0.05, 0.55);
        }
        if (len(m.x - player.px, m.z - player.pz) < 1.2) {
          damage(1);
          m.cooldown = 4.0;
          m.baseX += Math.sign(m.x - player.px || 1) * 3;
          }
      }
    }

    function updateEntropyOrbitPosition(m, warnScale = 1) {
      const phase = (m.phase || 0) + gameTime * (m.orbitSpeed || 0.48);
      const r = m.orbitR || 14;
      const squash = m.orbitSquash || 0.74;
      const jitter = warnScale > 1 ? 1.4 : 0.55;
      m.x = boss.x + Math.cos(phase) * r + Math.sin(gameTime * 4.4 + m.phase) * jitter;
      m.z = boss.z + Math.sin(phase) * r * squash + Math.cos(gameTime * 3.1 + m.phase) * jitter;
      m.baseX = m.x;
      m.baseZ = m.z;
    }

    function updateBossAftermath(dt) {
      update3DMovement(dt);
      boss.deathT = (boss.deathT || 0) + dt;
      if (!boss.deathSettled && boss.deathT < 3.35) {
        bossFlash = Math.max(bossFlash, 0.06);
        if (Math.random() < dt * 5.5) {
          const p = bossFxPoint(130, 90);
          burst(p.x, p.y, Math.random() < 0.55 ? "#fff" : "#ff3030", 10, 320);
          noiseBurst(0.035, 0.035);
        }
      }
      if (!boss.deathSettled && boss.deathT > 3.35) {
        boss.deathSettled = true;
        boss.usb.active = true;
        bossFlash = 0.35;
        beep(1040, 0.2, "triangle", 0.08, 0.72);
        const p = bossFxPoint(80, 60);
        burst(p.x, p.y, "#fff", 42, 520);
        addShake(10, 0.18);
      }
      if (!boss.hasUsb && boss.usb?.active && len(player.px - boss.usb.x, player.pz - boss.usb.z) < 1.8) {
        boss.hasUsb = true;
        boss.usb.active = false;
        boss.device.active = true;
        beep(880, 0.12, "triangle", 0.06, 1.5);
        burst(W / 2, H * 0.46, "#fff", 34, 420);
        addShake(9, 0.16);
      }
      const atDevice = boss.hasUsb && boss.device?.active && len(player.px - boss.device.x, player.pz - boss.device.z) < 4.8;
      if (atDevice && keys.has("KeyE") && !player.interactHeld) startVaccineCinematic();
      player.interactHeld = keys.has("KeyE");
    }

    function bossFxPoint(jitterX = 0, jitterY = 0) {
      const vp = current3DViewport();
      const p = boss ? project3D(boss.x, boss.y || 3.2, boss.z, vp.x, vp.y, vp.w, vp.h) : null;
      const x = (p?.x ?? (vp.x + vp.w / 2)) + (Math.random() * 2 - 1) * jitterX;
